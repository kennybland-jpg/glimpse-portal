<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card { 
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .slider-container {
            display: flex;
            width: 200%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen {
            width: 50%;
            padding: 2.5rem;
            box-sizing: border-box;
        }

        /* The specific state change class */
        .show-login { transform: translateX(-50%); }

        .btn-press:active { transform: scale(0.96); }
        
        #app-view {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- GATEWAY VIEW -->
    <div id="gateway-view" class="glass-card">
        <div id="main-slider" class="slider-container">
            
            <!-- START SCREEN -->
            <div class="screen flex flex-col items-center text-center">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mb-6 flex items-center justify-center shadow-xl text-3xl">✨</div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter mb-1">Glimpse</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">RDS 2026 Preview</p>
                
                <div class="w-full space-y-3">
                    <button id="btn-attendee" class="btn-press w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg transition-all shadow-lg shadow-blue-500/20">
                        Attendee Login
                    </button>
                    <button id="btn-staff" class="btn-press w-full py-5 border-2 border-slate-100 text-slate-400 rounded-2xl font-bold transition-all">
                        Staff Portal
                    </button>
                </div>
            </div>

            <!-- LOGIN SCREEN -->
            <div class="screen">
                <div class="flex items-center justify-between mb-8">
                    <h2 id="login-label" class="text-2xl font-black text-slate-900 tracking-tight">Login</h2>
                    <button id="btn-back" class="p-2 bg-slate-50 rounded-full text-slate-400">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                    </button>
                </div>

                <div class="space-y-6">
                    <div>
                        <input id="user-input" type="text" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-bold text-slate-800" placeholder="Your Name" />
                        <p id="error-text" class="text-red-500 text-[10px] font-black mt-3 uppercase hidden">Invalid Passcode</p>
                    </div>
                    <button id="btn-enter" class="btn-press w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl transition-all">
                        Enter Portal
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="app-view">
        <div class="max-w-md mx-auto min-h-screen p-8">
            <header class="mb-10 pt-8">
                <p class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Welcome Back</p>
                <h1 class="text-4xl font-black text-slate-900">Hey, <span id="display-name">Guest</span></h1>
            </header>
            
            <section>
                <h3 class="text-slate-300 font-black text-xs uppercase tracking-widest mb-6">Your Weekend Schedule</h3>
                <div id="schedule-feed" class="space-y-4">
                    <div class="p-6 bg-slate-50 rounded-3xl animate-pulse"></div>
                    <div class="p-6 bg-slate-50 rounded-3xl animate-pulse"></div>
                </div>
            </section>

            <nav class="fixed bottom-8 left-0 right-0 px-8">
                <div class="max-w-[280px] mx-auto bg-slate-900 rounded-full p-2 flex justify-between shadow-2xl">
                    <button class="w-12 h-12 flex items-center justify-center bg-blue-600 rounded-full text-white">🏠</button>
                    <button id="btn-logout" class="w-12 h-12 flex items-center justify-center text-slate-500">🚪</button>
                </div>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // State
        let currentMode = 'attendee';

        // Elements
        const slider = document.getElementById('main-slider');
        const input = document.getElementById('user-input');
        const label = document.getElementById('login-label');
        const error = document.getElementById('error-text');
        
        const btnAttendee = document.getElementById('btn-attendee');
        const btnStaff = document.getElementById('btn-staff');
        const btnBack = document.getElementById('btn-back');
        const btnEnter = document.getElementById('btn-enter');
        const btnLogout = document.getElementById('btn-logout');

        // Event Listeners (The reliable way)
        btnAttendee.addEventListener('click', () => {
            currentMode = 'attendee';
            label.innerText = 'Login';
            input.placeholder = 'Full Name';
            input.type = 'text';
            slider.classList.add('show-login');
        });

        btnStaff.addEventListener('click', () => {
            currentMode = 'staff';
            label.innerText = 'Staff Portal';
            input.placeholder = 'Passcode';
            input.type = 'password';
            slider.classList.add('show-login');
        });

        btnBack.addEventListener('click', () => {
            slider.classList.remove('show-login');
            error.classList.add('hidden');
        });

        btnEnter.addEventListener('click', async () => {
            const val = input.value.trim();
            if(!val) return;

            if(currentMode === 'staff' && val !== 'RDS12admin') {
                error.classList.remove('hidden');
                return;
            }

            document.getElementById('display-name').innerText = currentMode === 'staff' ? 'Staff Member' : val;
            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';

            initFirebase();
        });

        btnLogout.addEventListener('click', () => {
            location.reload();
        });

        async function initFirebase() {
            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-2026';

                await signInAnonymously(auth);

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                    const events = snap.docs.map(doc => doc.data()).sort((a,b) => a.time.localeCompare(b.time));
                    const feed = document.getElementById('schedule-feed');
                    
                    if (events.length === 0) {
                        feed.innerHTML = `<p class="text-slate-400 text-center py-10 font-bold">Waiting for schedule updates...</p>`;
                        return;
                    }

                    feed.innerHTML = events.map(e => `
                        <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                            <div class="flex justify-between items-start mb-2">
                                <span class="px-3 py-1 bg-white rounded-full text-[10px] font-black text-blue-600 shadow-sm">${e.time}</span>
                                <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${e.location || 'RDS'}</span>
                            </div>
                            <h4 class="text-lg font-black text-slate-900">${e.name}</h4>
                        </div>
                    `).join('');
                });
            } catch (err) {
                console.error("Firebase startup failed:", err);
            }
        }
    </script>
</body>
</html>
