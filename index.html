<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse Event Portal</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Calendar, Users, MapPin, Lock, Unlock, ShieldCheck, 
            Home, Info, LogOut, Edit2, X, User, Plus, Trash2, 
            KeyRound, Search, ChevronLeft, Filter, Clock 
        } = lucideReact;

        // ==========================================
        // STEP 4: PASTE YOUR FIREBASE CONFIG BELOW
        // ==========================================
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // ==========================================

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'glimpse-live-v1';

        const App = () => {
            const [fbUser, setFbUser] = useState(null);
            const [appUser, setAppUser] = useState(null);
            const [view, setView] = useState('schedule'); 
            const [currentTime, setCurrentTime] = useState(new Date());
            const [showExpiredEvents, setShowExpiredEvents] = useState(false);

            const [attendees, setAttendees] = useState([]);
            const [schedule, setSchedule] = useState([]);
            
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [showAttendeeLogin, setShowAttendeeLogin] = useState(false);
            const [loginInput, setLoginInput] = useState("");
            const [loginError, setLoginError] = useState("");
            const [editingUserId, setEditingUserId] = useState(null);
            const [editUserForm, setEditUserForm] = useState({ name: "", team: "", room: "" });
            const [editingEventId, setEditingEventId] = useState(null);
            const [editEventForm, setEditEventForm] = useState({ title: "", timeLabel: "", unlockTime: "", location: "" });
            const [isAddingAttendee, setIsAddingAttendee] = useState(false);

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("Auth:", err));
                const unsubscribe = auth.onAuthStateChanged(setFbUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!fbUser) return;
                const unsubAttendees = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendees')
                    .onSnapshot(snap => {
                        setAttendees(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                const unsubSchedule = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('schedule')
                    .onSnapshot(snap => {
                        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setSchedule(list.sort((a, b) => new Date(a.unlockTime) - new Date(b.unlockTime)));
                    });

                return () => { unsubAttendees(); unsubSchedule(); };
            }, [fbUser]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 30000);
                return () => clearInterval(timer);
            }, []);

            const handleAdminSubmit = (e) => {
                e?.preventDefault();
                if (loginInput === "RDS12admin") {
                    setAppUser({ id: 'admin-id', name: 'Staff Member', role: 'admin' });
                    setShowAdminLogin(false);
                    setLoginInput("");
                } else { setLoginError("Incorrect Password"); }
            };

            const handleAttendeeLogin = (e) => {
                e?.preventDefault();
                const found = attendees.find(a => a.name.toLowerCase().includes(loginInput.toLowerCase().trim()));
                if (found) {
                    setAppUser(found);
                    setShowAttendeeLogin(false);
                    setLoginInput("");
                } else { setLoginError("Name not found."); }
            };

            const saveEventChanges = async (id) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('schedule').doc(id).update(editEventForm);
                setEditingEventId(null);
            };

            const createNewEvent = async () => {
                const newEvent = { title: "New Event", timeLabel: "12:00 PM", unlockTime: new Date().toISOString().slice(0, 16), location: "Main Hall" };
                const res = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('schedule').add(newEvent);
                setEditingEventId(res.id);
                setEditEventForm(newEvent);
            };

            // Filters the schedule for the main view
            const visibleSchedule = schedule.filter(event => {
                if (showExpiredEvents || activeUser?.role === 'admin') return true;
                return new Date(event.unlockTime) >= currentTime;
            });

            if (!appUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="w-full max-w-sm bg-white rounded-[2rem] shadow-2xl p-10 text-center">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-xl rotate-3">
                                <Users className="text-white w-10 h-10 -rotate-3" />
                            </div>
                            <h1 className="text-4xl font-black text-slate-900 mb-2">Glimpse</h1>
                            <p className="text-slate-500 mb-10 font-medium">RDS Preview Weekend</p>
                            <div className="space-y-4">
                                <button onClick={() => { setShowAttendeeLogin(true); setLoginError(""); }} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg">Attendee Login</button>
                                <button onClick={() => { setShowAdminLogin(true); setLoginError(""); }} className="w-full py-5 border-2 border-slate-100 text-slate-600 rounded-2xl font-bold">Staff Portal</button>
                            </div>
                        </div>

                        {(showAdminLogin || showAttendeeLogin) && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-xs rounded-[2rem] p-8 shadow-2xl">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-slate-800">{showAdminLogin ? "Staff Auth" : "Login"}</h3>
                                        <button onClick={() => {setShowAdminLogin(false); setShowAttendeeLogin(false);}}><X size={20} className="text-slate-400" /></button>
                                    </div>
                                    <form onSubmit={showAdminLogin ? handleAdminSubmit : handleAttendeeLogin} className="space-y-6">
                                        <input 
                                            autoFocus
                                            type={showAdminLogin ? "password" : "text"}
                                            placeholder={showAdminLogin ? "Password" : "First Name"}
                                            value={loginInput}
                                            onChange={(e) => setLoginInput(e.target.value)}
                                            className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none"
                                        />
                                        {loginError && <p className="text-red-500 text-xs font-bold">{loginError}</p>}
                                        <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">Continue</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const activeUser = appUser.role === 'admin' ? appUser : (attendees.find(a => a.id === appUser.id) || appUser);

            return (
                <div className="min-h-screen bg-slate-50 pb-28 max-w-md mx-auto shadow-2xl relative flex flex-col overflow-hidden">
                    <header className="bg-white border-b border-slate-100 px-8 pt-14 pb-8 flex-none">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-[10px] font-black text-blue-600 tracking-widest uppercase mb-1">Live Portal</h1>
                                <p className="text-3xl font-black text-slate-900 tracking-tight">Glimpse</p>
                            </div>
                            <button onClick={() => {setAppUser(null); setView('schedule');}} className="p-3 bg-slate-50 rounded-2xl text-slate-400"><LogOut size={20} /></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 py-6 scrollbar-hide">
                        {view === 'schedule' && (
                            <div className="space-y-6">
                                <div className="flex items-center justify-between px-2">
                                    <h2 className="text-xl font-black text-slate-800">Schedule</h2>
                                    <button 
                                        onClick={() => setShowExpiredEvents(!showExpiredEvents)}
                                        className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-[10px] font-black uppercase transition-all ${showExpiredEvents ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-500'}`}
                                    >
                                        {showExpiredEvents ? 'Full View' : 'Live Now'}
                                        <Filter size={12} />
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {visibleSchedule.map((item) => {
                                        const isUnlocked = currentTime >= new Date(item.unlockTime) || activeUser.role === 'admin';
                                        return (
                                            <div key={item.id} className={`rounded-[2rem] p-6 border ${isUnlocked ? 'bg-white shadow-md border-slate-100' : 'bg-slate-100/50 border-slate-200 opacity-60'}`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full bg-blue-50 text-blue-600">{item.timeLabel}</span>
                                                    {isUnlocked ? <Unlock size={16} className="text-green-500" /> : <Lock size={16} className="text-slate-400" />}
                                                </div>
                                                <h3 className={`text-lg font-black ${isUnlocked ? 'text-slate-800' : 'text-slate-400'}`}>
                                                    {isUnlocked ? item.title : "Mystery Event"}
                                                </h3>
                                                {isUnlocked && <div className="mt-3 flex items-center text-slate-500 text-sm"><MapPin size={14} className="mr-2 text-blue-500" />{item.location}</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'manageEvents' && (
                            <div className="space-y-4">
                                <button onClick={() => setView('admin')} className="text-blue-600 font-bold flex items-center mb-4"><ChevronLeft size={20}/> Back</button>
                                <button onClick={createNewEvent} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center mb-4"><Plus size={20} className="mr-2"/> New Event</button>
                                {schedule.map(event => (
                                    <div key={event.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                        <div className="flex justify-between mb-4">
                                            <div>
                                                <h3 className="font-black">{event.title}</h3>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">{event.timeLabel} • {event.location}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setEditingEventId(event.id); setEditEventForm(event); }} className="p-2 bg-blue-50 text-blue-600 rounded-xl"><Edit2 size={16}/></button>
                                                <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('schedule').doc(event.id).delete()} className="p-2 bg-red-50 text-red-500 rounded-xl"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                        {editingEventId === event.id && (
                                            <div className="space-y-4 pt-4 border-t">
                                                <input className="w-full p-3 bg-slate-50 rounded-xl border" value={editEventForm.title} onChange={e => setEditEventForm({...editEventForm, title: e.target.value})} />
                                                <input type="datetime-local" className="w-full p-3 bg-slate-50 rounded-xl border" value={editEventForm.unlockTime} onChange={e => setEditEventForm({...editEventForm, unlockTime: e.target.value})} />
                                                <button onClick={() => saveEventChanges(event.id)} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Save</button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black text-slate-800">Staff Tools</h2>
                                <button onClick={() => setView('manageEvents')} className="w-full flex items-center justify-between bg-white border p-8 rounded-[2rem] shadow-sm">
                                    <div className="text-left"><h3 className="font-black">Schedule</h3><p className="text-xs text-slate-400">{schedule.length} Events</p></div>
                                    <Calendar className="text-blue-500" />
                                </button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-[340px] bg-white/90 backdrop-blur-xl border border-slate-200 shadow-2xl rounded-[2.5rem] p-2 flex justify-around items-center z-50">
                        <button onClick={() => setView('schedule')} className={`p-4 rounded-[2rem] flex-1 flex justify-center ${view === 'schedule' ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}><Calendar size={22} /></button>
                        {activeUser.role === 'admin' && (
                            <button onClick={() => setView('admin')} className={`p-4 rounded-[2rem] flex-1 flex justify-center ${view === 'admin' || view === 'manageEvents' ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}><ShieldCheck size={22} /></button>
                        )}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
