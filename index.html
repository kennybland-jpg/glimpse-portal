<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026 Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #0f172a; margin: 0; padding: 0; }
        
        .hidden-view { display: none !important; }
        
        /* Glassmorphism */
        .glass-card { 
            background: rgba(255, 255, 255, 1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        .animate-scale { animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Custom Scroll */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .tab-btn.active { background-color: #eff6ff; color: #2563eb; }
        
        /* Pulse for interactivity */
        .btn-pulse:active { transform: scale(0.97); }
    </style>
</head>
<body class="text-slate-900">

    <!-- LANDING VIEW -->
    <div id="landing-view" class="fixed inset-0 flex items-center justify-center p-6 z-[100] bg-slate-950">
        <div class="w-full max-w-sm glass-card rounded-[3rem] shadow-2xl p-10 text-center animate-scale">
            <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center shadow-2xl text-5xl">✨</div>
            <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tighter">Glimpse 2026</h1>
            <p class="text-slate-400 mb-12 font-semibold italic text-sm">RDS Preview Weekend</p>
            
            <div class="space-y-4">
                <button id="btn-attendee-init" class="btn-pulse w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-black text-lg shadow-xl shadow-blue-900/20 hover:bg-blue-700 transition-all">
                    Attendee Login
                </button>
                <button id="btn-admin-init" class="btn-pulse w-full py-5 border-2 border-slate-100 text-slate-500 rounded-[1.5rem] font-bold hover:bg-slate-50 transition-all">
                    Staff Portal
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[110] flex items-center justify-center p-6 hidden-view">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-scale relative">
            <button id="btn-close-modal" class="absolute top-6 right-6 p-2 bg-slate-50 rounded-full text-slate-400 hover:text-slate-600">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            
            <div class="mb-8">
                <h3 id="modal-title" class="font-black text-2xl text-slate-900 tracking-tight">Login</h3>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Authorized Access Only</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label id="input-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Your Full Name</label>
                    <input id="login-input" type="text" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl px-5 py-4 outline-none transition-all font-semibold text-slate-800" placeholder="Type here..." />
                    <p id="error-msg" class="text-red-500 text-[10px] font-black mt-3 ml-1 hidden-view uppercase tracking-tighter">Invalid access credentials</p>
                </div>
                <button id="btn-submit-login" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-2xl shadow-slate-900/30 active:scale-95 transition-all">
                    Enter Portal
                </button>
            </div>
        </div>
    </div>

    <!-- APP VIEW -->
    <div id="app-view" class="min-h-screen bg-slate-50 hidden-view flex flex-col items-center">
        <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col relative">
            
            <header class="px-8 pt-16 pb-6 bg-white sticky top-0 z-20">
                <div class="flex justify-between items-end">
                    <div>
                        <p id="current-date-header" class="text-[10px] font-black text-blue-600 tracking-[0.2em] uppercase mb-1">Glimpse 2026 // Live</p>
                        <h1 class="text-3xl font-black text-slate-900">Hey, <span id="user-display-name">Guest</span></h1>
                    </div>
                    <div class="text-right">
                        <p id="clock" class="text-xs font-bold text-slate-400 tabular-nums">00:00:00</p>
                        <button onclick="window.location.reload()" class="text-[9px] font-black text-red-400 uppercase tracking-widest mt-1">Log Out</button>
                    </div>
                </div>
            </header>

            <main id="main-scroll" class="flex-1 px-6 pb-32 overflow-y-auto custom-scroll">
                <!-- Schedule Tab -->
                <div id="tab-schedule" class="tab-content py-4 space-y-4">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest px-1">Timeline</h2>
                    <div id="schedule-list" class="space-y-4">
                        <div class="p-8 text-center text-slate-300 font-bold italic">Gathering data...</div>
                    </div>
                </div>

                <!-- Info Tab -->
                <div id="tab-info" class="tab-content py-4 hidden-view space-y-6">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest px-1">My Status</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div id="tribe-card" class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-200">
                            <p class="text-[10px] font-black text-blue-200 uppercase tracking-widest mb-1">Tribe</p>
                            <h3 id="info-tribe" class="text-2xl font-black">—</h3>
                        </div>
                        <div id="apt-card" class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl shadow-slate-200">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Apt</p>
                            <h3 id="info-apt" class="text-2xl font-black">—</h3>
                        </div>
                    </div>
                    <div id="mates-container" class="space-y-3">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Team Mates</h3>
                        <div id="mates-list" class="space-y-2"></div>
                    </div>
                </div>

                <!-- Admin Tab -->
                <div id="tab-admin" class="tab-content py-4 hidden-view space-y-8">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-black text-slate-900">Events</h2>
                            <button onclick="window.openEditor('event')" class="bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded-xl">ADD NEW</button>
                        </div>
                        <div id="admin-events" class="space-y-2"></div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-black text-slate-900">Members</h2>
                            <button onclick="window.openEditor('member')" class="bg-slate-900 text-white text-[10px] font-black px-4 py-2 rounded-xl">ADD NEW</button>
                        </div>
                        <div id="admin-members" class="space-y-2"></div>
                    </div>
                </div>
            </main>

            <!-- NAV -->
            <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[85%] max-w-[320px] bg-white/80 backdrop-blur-2xl border border-white/50 shadow-[0_20px_50px_rgba(0,0,0,0.1)] rounded-[2.5rem] p-2 flex justify-between z-30">
                <button id="nav-btn-schedule" class="tab-btn active flex-1 py-4 rounded-[2rem] flex flex-col items-center transition-all">
                    <span class="text-xl">📅</span>
                    <span class="text-[8px] font-black uppercase mt-1 tracking-tighter">Plan</span>
                </button>
                <button id="nav-btn-info" class="tab-btn flex-1 py-4 rounded-[2rem] flex flex-col items-center transition-all text-slate-400">
                    <span class="text-xl">👤</span>
                    <span class="text-[8px] font-black uppercase mt-1 tracking-tighter">Me</span>
                </button>
                <button id="nav-btn-admin" class="tab-btn flex-1 py-4 rounded-[2rem] flex flex-col items-center transition-all text-slate-400 hidden-view">
                    <span class="text-xl">⚙️</span>
                    <span class="text-[8px] font-black uppercase mt-1 tracking-tighter">Core</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- UNIVERSAL EDITOR -->
    <div id="editor-overlay" class="fixed inset-0 bg-slate-950/90 z-[200] hidden-view flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 animate-scale pb-16">
            <div class="flex justify-between items-center mb-8">
                <h3 id="editor-title" class="text-2xl font-black text-slate-900">Edit Entry</h3>
                <button id="btn-close-editor" class="text-slate-300 hover:text-slate-900 font-bold">CANCEL</button>
            </div>
            <form id="editor-form" class="space-y-5">
                <div id="editor-fields" class="space-y-4"></div>
                <div class="pt-6 space-y-3">
                    <button type="submit" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black">SAVE CHANGES</button>
                    <button type="button" id="btn-delete" class="w-full py-2 text-red-500 font-bold text-xs">DELETE PERMANENTLY</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-2026';

        let events = [];
        let members = [];
        let currentUser = null;
        let isAdmin = false;

        const ui = {
            view: (id, show) => document.getElementById(id).classList.toggle('hidden-view', !show),
            set: (id, val) => { if(document.getElementById(id)) document.getElementById(id).innerText = val; }
        };

        // --- LOGIN LOGIC ---
        const openLogin = (mode) => {
            const modal = document.getElementById('login-modal');
            modal.dataset.mode = mode;
            ui.set('modal-title', mode === 'admin' ? 'Staff Login' : 'Sign In');
            document.getElementById('login-input').type = mode === 'admin' ? 'password' : 'text';
            document.getElementById('login-input').value = '';
            ui.view('login-modal', true);
            document.getElementById('login-input').focus();
        };

        // Bind Landing Buttons
        document.getElementById('btn-attendee-init').addEventListener('click', () => openLogin('attendee'));
        document.getElementById('btn-admin-init').addEventListener('click', () => openLogin('admin'));
        document.getElementById('btn-close-modal').addEventListener('click', () => ui.view('login-modal', false));

        document.getElementById('btn-submit-login').onclick = async () => {
            const mode = document.getElementById('login-modal').dataset.mode;
            const input = document.getElementById('login-input').value.trim();
            if(!input) return;

            if(mode === 'admin') {
                if(input === 'RDS12admin') {
                    isAdmin = true;
                    enterApp('Staff');
                } else {
                    ui.view('error-msg', true);
                }
            } else {
                enterApp(input);
            }
        };

        async function enterApp(name) {
            currentUser = name;
            ui.set('user-display-name', name);
            
            // Firebase Auth Check
            if(!auth.currentUser) await signInAnonymously(auth);
            
            ui.view('landing-view', false);
            ui.view('login-modal', false);
            ui.view('app-view', true);
            
            if(isAdmin) {
                ui.view('nav-btn-admin', true);
                switchTab('admin');
            } else {
                switchTab('schedule');
            }
        }

        // --- NAVIGATION ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden-view'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'text-blue-600', 'bg-blue-50');
                b.classList.add('text-slate-400');
            });

            ui.view(`tab-${tab}`, true);
            const btn = document.getElementById(`nav-btn-${tab}`);
            btn.classList.add('active', 'text-blue-600', 'bg-blue-50');
            btn.classList.remove('text-slate-400');
            
            if(tab === 'info') renderInfo();
        }

        document.getElementById('nav-btn-schedule').onclick = () => switchTab('schedule');
        document.getElementById('nav-btn-info').onclick = () => switchTab('info');
        document.getElementById('nav-btn-admin').onclick = () => switchTab('admin');

        // --- DATA SYNC ---
        onAuthStateChanged(auth, (user) => {
            if(!user) return;
            
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), s => {
                events = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderSchedule();
                if(isAdmin) renderAdminEvents();
            }, (err) => console.log(err));

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'members'), s => {
                members = s.docs.map(d => ({id: d.id, ...d.data()}));
                if(isAdmin) renderAdminMembers();
            }, (err) => console.log(err));
        });

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = events.length ? events.map(e => `
                <div class="bg-white border border-slate-100 p-6 rounded-[2.5rem] shadow-sm animate-scale">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase tracking-widest">${e.time}</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">📍 ${e.location}</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-900 tracking-tight">${e.name}</h3>
                </div>
            `).join('') : '<div class="p-12 text-center text-slate-300 font-bold">No events scheduled.</div>';
        }

        function renderInfo() {
            const me = members.find(m => m.name.toLowerCase() === currentUser.toLowerCase());
            ui.set('info-tribe', me?.tribe || '—');
            ui.set('info-apt', me?.apartment || '—');
            
            if(me) {
                const team = members.filter(m => m.tribe === me.tribe && m.name !== me.name);
                document.getElementById('mates-list').innerHTML = team.map(t => `
                    <div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center">
                        <span class="font-bold text-slate-800">${t.name}</span>
                        <span class="text-[9px] font-black text-slate-400 uppercase">Apt ${t.apartment}</span>
                    </div>
                `).join('');
            }
        }

        // --- ADMIN EDITOR ---
        let currentEditingId = null;
        let currentEditingType = null;

        window.openEditor = (type, id = null) => {
            currentEditingId = id;
            currentEditingType = type;
            const data = id ? (type === 'event' ? events : members).find(i => i.id === id) : null;
            
            ui.set('editor-title', id ? 'Update Entry' : `New ${type}`);
            const fields = type === 'event' ? 
                [['name','Event Name'],['time','Start Time'],['location','Location']] :
                [['name','Full Name'],['tribe','Tribe'],['apartment','Apartment #']];
                
            document.getElementById('editor-fields').innerHTML = fields.map(([k, l]) => `
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block ml-1">${l}</label>
                    <input id="edit-${k}" value="${data?.[k] || ''}" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border-2 border-transparent focus:border-blue-500 font-bold" />
                </div>
            `).join('');
            
            ui.view('btn-delete', !!id);
            ui.view('editor-overlay', true);
        };

        document.getElementById('editor-form').onsubmit = async (e) => {
            e.preventDefault();
            const colName = currentEditingType === 'event' ? 'events' : 'members';
            const payload = {};
            document.querySelectorAll('#editor-fields input').forEach(inp => {
                payload[inp.id.replace('edit-', '')] = inp.value;
            });

            if(currentEditingId) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, currentEditingId), payload);
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), payload);
            }
            ui.view('editor-overlay', false);
        };

        document.getElementById('btn-delete').onclick = async () => {
            if(!confirm('Delete this entry?')) return;
            const colName = currentEditingType === 'event' ? 'events' : 'members';
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, currentEditingId));
            ui.view('editor-overlay', false);
        };

        document.getElementById('btn-close-editor').onclick = () => ui.view('editor-overlay', false);

        function renderAdminEvents() {
            document.getElementById('admin-events').innerHTML = events.map(e => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <span class="font-bold text-slate-700">${e.name}</span>
                    <button onclick="window.openEditor('event', '${e.id}')" class="text-blue-600 font-black text-[10px] uppercase">Edit</button>
                </div>
            `).join('');
        }

        function renderAdminMembers() {
            document.getElementById('admin-members').innerHTML = members.map(m => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <span class="font-bold text-slate-700">${m.name}</span>
                    <button onclick="window.openEditor('member', '${m.id}')" class="text-blue-600 font-black text-[10px] uppercase">Edit</button>
                </div>
            `).join('');
        }

        // CLOCK
        setInterval(() => {
            ui.set('clock', new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }));
        }, 1000);

    </script>
</body>
</html>
