<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .glass-card { background: white; width: 95%; max-width: 420px; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-press:active { transform: scale(0.96); }
        #app-view { display: none; position: fixed; inset: 0; background: #ffffff; z-index: 100; overflow-y: auto; }
        .nav-item { transition: all 0.2s ease; color: #94a3b8; cursor: pointer; }
        .nav-item.active { background-color: #2563eb; color: white; transform: translateY(-4px); }
        .view-content { display: none; }
        .view-content.active { display: block; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .input-pill { width: 100%; background: #f1f5f9; border: 2px solid transparent; border-radius: 1rem; padding: 0.75rem 1rem; outline: none; font-weight: 600; font-size: 14px; color: #1e293b; }
        .input-pill:focus { border-color: #2563eb; background: white; }
        
        .reveal-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clickable-card { cursor: pointer; transition: transform 0.2s; }
        .clickable-card:active { transform: scale(0.95); }

        .toggle-container { background: #f1f5f9; border-radius: 12px; padding: 4px; display: inline-flex; position: relative; }
        .toggle-btn { padding: 6px 16px; border-radius: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.2s; position: relative; z-index: 1; color: #64748b; text-align: center; }
        .toggle-btn.active { color: white; }
        .toggle-slider { position: absolute; top: 4px; left: 4px; height: calc(100% - 8px); background: #2563eb; border-radius: 8px; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 0; }
        
        .admin-label { display: block; font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; margin-left: 4px; }
        
        .serve-card { background-color: #f0f7ff; border-color: #dbeafe; }
        .serve-tag { background-color: #dbeafe; color: #1d4ed8; }

        .star-active { color: #f59e0b; }
        .star-inactive { color: #cbd5e1; }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="glass-card max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <button id="btn-back-modal" class="text-blue-600 font-bold hidden">← Back</button>
                <h2 id="modal-title" class="text-2xl font-black">Details</h2>
                <button id="btn-close-modal" class="text-slate-400 font-bold p-2">✕</button>
            </div>
            <div id="modal-body" class="overflow-y-auto pr-2 space-y-4"></div>
            <div id="modal-footer" class="mt-6 pt-4 border-t border-slate-100 flex gap-2"></div>
        </div>
    </div>

    <!-- Gateway View -->
    <div id="gateway-view" class="glass-card">
        <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center shadow-xl text-2xl text-white">✨</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Glimpse</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">RDS 2026 Portal</p>
            <div class="w-full space-y-4">
                <input id="user-input" type="text" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-bold text-slate-800 text-center uppercase" placeholder="First Name + Last Initial" />
                <button id="btn-enter" class="btn-press w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl">Access Portal</button>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-view">
        <div class="max-w-md mx-auto min-h-screen p-8 pb-32">
            <!-- Schedule View -->
            <div id="view-schedule" class="view-content active">
                <header class="mb-8 pt-8">
                    <div class="flex flex-col sm:flex-row gap-6 mb-6">
                        <div>
                            <span class="admin-label">Day selection</span>
                            <div class="toggle-container w-fit">
                                <div id="day-slider" class="toggle-slider" style="width: 70px;"></div>
                                <div onclick="setDay(1)" id="btn-day-1" class="toggle-btn active" style="width: 70px;">Day 1</div>
                                <div onclick="setDay(2)" id="btn-day-2" class="toggle-btn" style="width: 70px;">Day 2</div>
                            </div>
                        </div>
                        
                        <div id="serve-toggle-wrapper" class="hidden">
                            <span class="admin-label">SERVE TEAMS</span>
                            <div class="toggle-container w-fit">
                                <div id="serve-slider" class="toggle-slider" style="width: 60px; transform: translateX(60px); background: #64748b;"></div>
                                <div onclick="toggleServe(true)" id="btn-serve-on" class="toggle-btn" style="width: 60px;">On</div>
                                <div onclick="toggleServe(false)" id="btn-serve-off" class="toggle-btn active" style="width: 60px;">Off</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p id="schedule-subtitle" class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Live Schedule</p>
                        <h1 class="text-4xl font-black text-slate-900">Hey, <span id="display-name">Guest</span></h1>
                    </div>
                </header>
                <div id="schedule-feed" class="space-y-4"></div>
            </div>

            <!-- Profile View -->
            <div id="view-profile" class="view-content">
                <header class="mb-10 pt-8"><h1 class="text-4xl font-black text-slate-900">Account</h1></header>
                
                <div class="bg-slate-50 p-8 rounded-[2.5rem] text-center mb-6 border border-slate-100">
                    <div class="w-24 h-24 bg-white shadow-sm rounded-full mx-auto mb-4 flex items-center justify-center text-3xl border border-slate-100">👤</div>
                    <h2 id="profile-name" class="text-2xl font-black text-slate-900">Guest User</h2>
                    
                    <div id="attendee-widgets" class="grid grid-cols-2 gap-3 mt-8">
                        <div id="tribe-card" class="p-4 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 text-left clickable-card btn-press">
                            <span class="block text-[9px] font-black text-blue-100 uppercase mb-1">Tribe</span>
                            <span id="display-tribe" class="text-sm font-black text-white">None</span>
                        </div>
                        <div id="apt-card" class="p-4 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 text-left clickable-card btn-press">
                            <span class="block text-[9px] font-black text-blue-100 uppercase mb-1">Apt</span>
                            <span id="display-apt" class="text-sm font-black text-white">None</span>
                        </div>
                        <div id="buddy-card" class="col-span-2 p-6 bg-white border-2 border-blue-600 rounded-2xl text-left clickable-card btn-press mt-1">
                            <span id="profile-role" class="block text-sm font-black text-blue-600 uppercase mb-1">Person of Reference</span>
                            <span id="display-buddy" class="text-xs font-bold text-slate-400">No notes provided.</span>
                        </div>
                    </div>

                    <!-- Admin Control Widget -->
                    <div id="admin-controls" class="hidden text-left mt-6">
                        <span class="admin-label mb-3">Staff Management</span>
                        <div class="grid grid-cols-2 gap-3">
                            <button id="btn-manage-members" class="flex flex-col items-center justify-center p-6 bg-slate-900 rounded-3xl border border-white/5 btn-press transition-all"><span class="text-3xl mb-2">👥</span><span class="text-[11px] font-black text-white uppercase tracking-tighter">Members</span></button>
                            <button id="btn-manage-events" class="flex flex-col items-center justify-center p-6 bg-slate-900 rounded-3xl border border-white/5 btn-press transition-all"><span class="text-3xl mb-2">🗓️</span><span class="text-[11px] font-black text-white uppercase tracking-tighter">Events</span></button>
                        </div>
                    </div>
                </div>

                <button id="btn-logout" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm uppercase btn-press">Log Out</button>
            </div>

            <!-- Tab Navigation -->
            <nav class="fixed bottom-8 left-0 right-0 px-8 z-[110]">
                <div class="max-w-[200px] mx-auto bg-slate-900 rounded-full p-2 flex justify-around shadow-2xl">
                    <button data-view="schedule" class="nav-item active w-14 h-14 flex items-center justify-center rounded-full text-xl">📅</button>
                    <button data-view="profile" class="nav-item w-14 h-14 flex items-center justify-center rounded-full text-xl">👤</button>
                </div>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPSo9wjrQsnrYfnN4a-STKJ43Avr5Et8A",
            authDomain: "glimpse-2026.firebaseapp.com",
            projectId: "glimpse-2026",
            storageBucket: "glimpse-2026.firebasestorage.app",
            messagingSenderId: "923394524187",
            appId: "1:923394524187:web:5ac3d31b8ccb26058a24be",
            measurementId: "G-EJCENYVW5S"
        };

        const appId = 'glimpse-2026';
        let db, auth, currentUserData = null;
        let allMembers = [], allEvents = [];
        let activeDay = 1;
        let showServeEvents = false;
        let isAdmin = false;

        const modal = {
            el: document.getElementById('modal-overlay'),
            title: document.getElementById('modal-title'),
            body: document.getElementById('modal-body'),
            footer: document.getElementById('modal-footer'),
            backBtn: document.getElementById('btn-back-modal'),
            show: function(title, bodyHtml, footerHtml = "", onBack = null) {
                this.title.innerText = title;
                this.body.innerHTML = bodyHtml;
                this.footer.innerHTML = footerHtml;
                this.el.style.display = 'flex';
                if(onBack) {
                    this.backBtn.classList.remove('hidden');
                    this.backBtn.onclick = onBack;
                } else {
                    this.backBtn.classList.add('hidden');
                }
            },
            hide: function() { this.el.style.display = 'none'; }
        };

        async function init() {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => { if (user) syncData(); });

            // Start Cleanup Cycle (Every 60 seconds)
            setInterval(cleanupExpiredEvents, 60000);
        }

        async function cleanupExpiredEvents() {
            const now = new Date().getTime();
            const expired = allEvents.filter(e => e.endTime && new Date(e.endTime).getTime() < now);
            for (const e of expired) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', e.id));
                } catch (err) {
                    console.error("Cleanup error:", err);
                }
            }
        }

        function syncData() {
            const eventsCol = collection(db, 'artifacts', appId, 'public', 'data', 'events');
            const membersCol = collection(db, 'artifacts', appId, 'public', 'data', 'members');
            onSnapshot(eventsCol, (snap) => {
                allEvents = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderSchedule();
            }, (err) => console.error(err));
            
            onSnapshot(membersCol, (snap) => {
                allMembers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                if(currentUserData) {
                    const fresh = allMembers.find(m => m.name.toLowerCase() === currentUserData.name.toLowerCase());
                    if(fresh) updateAttendeeUI(fresh);
                }
                if (modal.el.style.display === 'flex' && modal.title.innerText === "Members") {
                    document.getElementById('btn-manage-members').click();
                }
            }, (err) => console.error(err));
        }

        window.setDay = (day) => {
            activeDay = day;
            const slider = document.getElementById('day-slider');
            if (day === 1) slider.style.transform = 'translateX(0)';
            else slider.style.transform = 'translateX(70px)';
            document.getElementById('btn-day-1').classList.toggle('active', day === 1);
            document.getElementById('btn-day-2').classList.toggle('active', day === 2);
            renderSchedule();
        }

        window.toggleServe = (on) => {
            showServeEvents = on;
            const slider = document.getElementById('serve-slider');
            if (on) { slider.style.transform = 'translateX(0)'; slider.style.background = '#2563eb'; }
            else { slider.style.transform = 'translateX(60px)'; slider.style.background = '#64748b'; }
            document.getElementById('btn-serve-on').classList.toggle('active', on);
            document.getElementById('btn-serve-off').classList.toggle('active', !on);
            renderSchedule();
        }

        function renderSchedule() {
            const feed = document.getElementById('schedule-feed');
            const now = new Date();
            
            const filteredEvents = allEvents.filter(e => {
                const dayMatch = parseInt(e.day || 1) === activeDay;
                const isServe = e.category === 'serve';
                if (!dayMatch) return false;
                if (isServe && !showServeEvents) return false;
                return true;
            });

            const html = filteredEvents
                .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''))
                .map(e => {
                    const revealDate = e.revealTime ? new Date(e.revealTime) : null;
                    const isLocked = revealDate && now < revealDate && e.category !== 'serve';
                    const isServe = e.category === 'serve';
                    
                    // Simple time display from full ISO string
                    const startTimeDisplay = e.startTime ? new Date(e.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'TBD';

                    return `
                        <div class="p-6 rounded-3xl border shadow-sm reveal-anim ${isServe ? 'serve-card border-blue-100' : 'bg-white border-slate-100'}">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${isServe ? 'serve-tag' : 'bg-blue-50 text-blue-600'}">
                                    ${startTimeDisplay} ${isServe ? '• SERVE' : ''}
                                </span>
                                ${isLocked ? '<span>🔒</span>' : ''}
                            </div>
                            <h3 class="text-xl font-black text-slate-800 mt-3">${isLocked ? '<span class="text-slate-200 italic">Classified</span>' : e.name}</h3>
                            <div class="flex flex-col mt-2">
                                <span class="text-xs text-slate-400 font-bold">${isLocked ? '???' : (e.location || 'TBD')}</span>
                                ${isServe && e.team ? `<span class="text-[10px] text-blue-500 font-black uppercase mt-1">Team: ${e.team}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            feed.innerHTML = html || `<p class="text-center py-10 text-slate-300">No events found.</p>`;
        }

        function updateAttendeeUI(member) {
            currentUserData = member;
            document.getElementById('display-tribe').innerText = member.tribe || "Unassigned";
            document.getElementById('display-apt').innerText = member.apt || "Unassigned";
            document.getElementById('display-buddy').innerText = member.buddyNotes || "No notes provided.";
            
            const roleEl = document.getElementById('profile-role');
            if (isAdmin) {
                roleEl.innerText = "System Admin Access";
            } else {
                roleEl.innerText = member.isStarred ? "Glimpse Buddy" : "Person of Reference";
            }

            document.getElementById('attendee-widgets').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-controls').classList.toggle('hidden', !isAdmin);
            document.getElementById('serve-toggle-wrapper').classList.toggle('hidden', !(isAdmin || member.isStarred));
        }

        document.getElementById('btn-enter').onclick = () => {
            const name = document.getElementById('user-input').value.trim();
            if (!name) return;
            document.getElementById('display-name').innerText = name.split(' ')[0];
            document.getElementById('profile-name').innerText = name;
            
            isAdmin = name.toUpperCase() === 'RDS12ADMIN';
            
            const matched = allMembers.find(m => m.name.toUpperCase() === name.toUpperCase());
            if(matched) {
                updateAttendeeUI(matched);
            } else { 
                currentUserData = { name: name, tribe: 'Unassigned', apt: 'Unassigned', isStarred: false, buddyNotes: "" }; 
                updateAttendeeUI(currentUserData); 
            }
            
            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';
            renderSchedule();
        };

        window.toggleMemberStar = async (id, currentState) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), {
                isStarred: !currentState
            });
        };

        window.editMember = (id) => openMemberForm(allMembers.find(x => x.id === id));
        window.editEvent = (id) => openEventForm(allEvents.find(x => x.id === id));

        function openMemberForm(m = null) {
            modal.show(m ? "Edit Member" : "New Member", `
                <div class="space-y-4 text-left">
                    <div><label class="admin-label">Full Name</label><input id="f-name" class="input-pill" placeholder="Identity" value="${m?.name || ''}"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="admin-label">Tribe</label><input id="f-tribe" class="input-pill" placeholder="Tribe Name" value="${m?.tribe || ''}"></div>
                        <div><label class="admin-label">Housing</label><input id="f-apt" class="input-pill" placeholder="Apt #" value="${m?.apt || ''}"></div>
                    </div>
                    <div>
                        <label class="admin-label">Glimpse Buddy Notes</label>
                        <textarea id="f-buddy" class="input-pill h-24 py-3" placeholder="Buddy info or specific notes...">${m?.buddyNotes || ''}</textarea>
                    </div>
                </div>
            `, `
                <button id="btn-submit-member" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Save</button>
                ${m ? `<button id="btn-del-member" class="px-6 py-4 bg-red-50 text-red-600 rounded-2xl font-bold">Delete</button>` : ''}
            `, () => document.getElementById('btn-manage-members').click());

            document.getElementById('btn-submit-member').onclick = async () => {
                const nameInput = document.getElementById('f-name').value.trim();
                const data = { 
                    name: nameInput, 
                    tribe: document.getElementById('f-tribe').value, 
                    apt: document.getElementById('f-apt').value,
                    buddyNotes: document.getElementById('f-buddy').value,
                    isStarred: m?.isStarred || false
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m?.id || nameInput.toLowerCase().replace(/\s+/g, '-')), data);
                document.getElementById('btn-manage-members').click();
            };
            if(m) document.getElementById('btn-del-member').onclick = async () => { 
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m.id)); 
                document.getElementById('btn-manage-members').click(); 
            };
        }

        function openEventForm(e = null) {
            const showSpecifics = (cat) => {
                const specDiv = document.getElementById('category-specifics');
                if (cat === 'serve') {
                    specDiv.innerHTML = `
                        <label class="admin-label">Team Name (Custom Type)</label>
                        <input id="e-team" class="input-pill" placeholder="e.g. Media, Cafe, Worship" value="${e?.team || ''}">
                    `;
                } else {
                    specDiv.innerHTML = `
                        <label class="admin-label">Reveal Time (Locked until then)</label>
                        <input id="e-reveal" type="datetime-local" class="input-pill" value="${e?.revealTime || ''}">
                    `;
                }
            };

            modal.show(e ? "Edit Event" : "New Event", `
                <div class="space-y-4 text-left">
                    <div><label class="admin-label">Event Name</label><input id="e-name" class="input-pill" value="${e?.name || ''}"></div>
                    <div>
                        <label class="admin-label">Category</label>
                        <select id="e-category" class="input-pill">
                            <option value="main" ${e?.category !== 'serve' ? 'selected' : ''}>Main Schedule</option>
                            <option value="serve" ${e?.category === 'serve' ? 'selected' : ''}>Serve/Volunteer</option>
                        </select>
                    </div>
                    <div id="category-specifics"></div>
                    <div><label class="admin-label">Location</label><input id="e-loc" class="input-pill" value="${e?.location || ''}"></div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="admin-label">Event Day (UI Filter)</label>
                            <select id="e-day" class="input-pill">
                                <option value="1" ${e?.day == 1 ? 'selected' : ''}>Day 1</option>
                                <option value="2" ${e?.day == 2 ? 'selected' : ''}>Day 2</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="admin-label">Start Date & Time</label>
                            <input id="e-start" type="datetime-local" class="input-pill" value="${e?.startTime || ''}">
                        </div>
                        <div class="col-span-2">
                            <label class="admin-label">End Date & Time (Auto-Delete after this)</label>
                            <input id="e-end" type="datetime-local" class="input-pill" value="${e?.endTime || ''}">
                        </div>
                    </div>
                </div>`, `
                <button id="btn-submit-event" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Save</button>
                ${e ? `<button id="btn-del-event" class="px-6 py-4 bg-red-50 text-red-600 rounded-2xl font-bold">Delete</button>` : ''}
            `, () => document.getElementById('btn-manage-events').click());

            const catSelect = document.getElementById('e-category');
            catSelect.onchange = (ev) => showSpecifics(ev.target.value);
            showSpecifics(e?.category || 'main');

            document.getElementById('btn-submit-event').onclick = async () => {
                const cat = document.getElementById('e-category').value;
                const data = {
                    name: document.getElementById('e-name').value,
                    category: cat,
                    location: document.getElementById('e-loc').value,
                    day: document.getElementById('e-day').value,
                    startTime: document.getElementById('e-start').value,
                    endTime: document.getElementById('e-end').value,
                };
                if (cat === 'serve') {
                    data.team = document.getElementById('e-team').value;
                } else {
                    data.revealTime = document.getElementById('e-reveal').value;
                }
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', e?.id || Date.now().toString()), data);
                document.getElementById('btn-manage-events').click();
            };

            if(e) document.getElementById('btn-del-event').onclick = async () => { 
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', e.id)); 
                document.getElementById('btn-manage-events').click(); 
            };
        }

        document.getElementById('btn-manage-members').onclick = () => {
            const list = allMembers
                .sort((a,b) => a.name.localeCompare(b.name))
                .map(m => `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2">
                        <div class="flex items-center gap-2">
                            <button onclick="toggleMemberStar('${m.id}', ${m.isStarred || false})" class="text-lg transition-all ${m.isStarred ? 'star-active' : 'star-inactive'}">
                                ${m.isStarred ? '★' : '☆'}
                            </button>
                            <div class="text-sm font-bold text-slate-800">${m.name}</div>
                        </div>
                        <button onclick="editMember('${m.id}')" class="text-blue-600 text-[10px] font-black uppercase">Edit</button>
                    </div>`).join('');
            modal.show("Members", `<button id="m-add" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold mb-4">+ Add Member</button><div class="pb-4">${list}</div>`);
            document.getElementById('m-add').onclick = () => openMemberForm();
        };

        document.getElementById('btn-manage-events').onclick = () => {
            const list = allEvents
                .sort((a,b) => a.day - b.day || (a.startTime||'').localeCompare(b.startTime||''))
                .map(e => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2"><div class="text-sm font-bold text-slate-800">${e.name} (D${e.day||1})</div><button onclick="editEvent('${e.id}')" class="text-blue-600 text-[10px] font-black uppercase">Edit</button></div>`).join('');
            modal.show("Events", `<button id="e-add" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold mb-4">+ Add Event</button><div class="pb-4">${list}</div>`);
            document.getElementById('e-add').onclick = () => openEventForm();
        };

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
                document.getElementById(`view-${btn.dataset.view}`).classList.add('active');
            };
        });

        document.getElementById('btn-close-modal').onclick = () => modal.hide();
        document.getElementById('btn-logout').onclick = () => location.reload();
        document.getElementById('tribe-card').onclick = () => { if(currentUserData) showGrouping('tribe', currentUserData.tribe); };
        document.getElementById('apt-card').onclick = () => { if(currentUserData) showGrouping('apt', currentUserData.apt); };

        function showGrouping(type, value) {
            if(!value || value === "Unassigned") return;
            const matches = allMembers.filter(m => m[type] === value);
            const listHtml = matches.map(m => `<div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-2"><div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-xs shadow-sm">👤</div><div class="text-sm font-bold text-slate-800">${m.name}</div></div>`).join('');
            modal.show(`${type === 'tribe' ? 'Tribe' : 'Apt'}: ${value}`, `<div class="pt-2">${listHtml || '<p class="text-slate-400">Nobody else here yet.</p>'}</div>`);
        }

        init();
    </script>
</body>
</html>
