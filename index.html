<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card { 
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 2.5rem;
        }

        .btn-press:active { transform: scale(0.96); }
        
        #app-view {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            overflow-y: auto;
        }

        .nav-item {
            transition: all 0.2s ease;
            color: #94a3b8;
        }
        
        .nav-item.active {
            background-color: #2563eb;
            color: white;
            transform: translateY(-4px);
        }

        .view-content {
            display: none;
        }
        .view-content.active {
            display: block;
        }

        .admin-widget {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .community-widget {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        }

        /* Management Overlays */
        #admin-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            overflow-y: auto;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }

        .input-field {
            width: 100%;
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: bold;
            border: 2px solid transparent;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #2563eb;
            background: white;
        }
    </style>
</head>
<body>

    <!-- GATEWAY VIEW -->
    <div id="gateway-view" class="glass-card">
        <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center shadow-xl text-2xl">✨</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Glimpse</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">RDS 2026 Preview</p>
            
            <div class="w-full space-y-4">
                <div class="relative">
                    <input id="user-input" type="text" 
                        class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-bold text-slate-800 transition-all text-center" 
                        placeholder="Enter your name" />
                </div>
                <button id="btn-enter" class="btn-press w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl transition-all">
                    Access Portal
                </button>
                <p class="text-[10px] text-slate-400 font-medium">Use passcode for staff access</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="app-view">
        <div class="max-w-md mx-auto min-h-screen p-8 pb-32">
            
            <!-- SCHEDULE VIEW -->
            <div id="view-schedule" class="view-content active">
                <header class="mb-10 pt-8">
                    <p class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Welcome Back</p>
                    <h1 class="text-4xl font-black text-slate-900">Hey, <span id="display-name">Guest</span></h1>
                </header>
                
                <section>
                    <h3 class="text-slate-300 font-black text-xs uppercase tracking-widest mb-6">Your Weekend Schedule</h3>
                    <div id="schedule-feed" class="space-y-4">
                        <div class="p-6 bg-slate-50 rounded-3xl animate-pulse h-24"></div>
                        <div class="p-6 bg-slate-50 rounded-3xl animate-pulse h-24"></div>
                    </div>
                </section>
            </div>

            <!-- PROFILE VIEW -->
            <div id="view-profile" class="view-content">
                <header class="mb-10 pt-8">
                    <h1 class="text-4xl font-black text-slate-900">Account</h1>
                </header>
                
                <!-- Main User Card -->
                <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 text-center mb-6">
                    <div class="w-24 h-24 bg-white shadow-sm rounded-full mx-auto mb-4 flex items-center justify-center text-3xl border border-slate-100">👤</div>
                    <h2 id="profile-name" class="text-2xl font-black text-slate-900">Guest User</h2>
                    <p id="profile-role" class="text-blue-600 font-bold text-xs uppercase tracking-widest mt-1">Attendee</p>
                </div>

                <!-- ADMIN ONLY WIDGET -->
                <div id="admin-controls" class="hidden admin-widget p-8 rounded-[2.5rem] text-white shadow-xl mb-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-black text-sm uppercase tracking-widest opacity-80">Staff Control Center</h3>
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                            <span class="text-[9px] font-bold text-green-400 uppercase">Live</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-manage-members" class="flex flex-col items-center justify-center p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all aspect-square border border-white/5">
                            <span class="text-2xl mb-2">👥</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-center">Manage Members</span>
                        </button>
                        <button id="btn-manage-events" class="flex flex-col items-center justify-center p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all aspect-square border border-white/5">
                            <span class="text-2xl mb-2">🗓️</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-center">Manage Events</span>
                        </button>
                    </div>
                </div>

                <!-- ATTENDEE COMMUNITY WIDGET -->
                <div id="attendee-controls" class="hidden community-widget p-8 rounded-[2.5rem] border border-blue-100 shadow-sm mb-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-black text-sm uppercase tracking-widest text-blue-800 opacity-80">Community Hub</h3>
                        <span class="text-[9px] font-bold text-blue-500 uppercase">Your Group</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button class="flex flex-col items-center justify-center p-4 bg-white hover:bg-blue-50 rounded-2xl transition-all aspect-square border border-blue-200/50 shadow-sm">
                            <span class="text-2xl mb-2">🛡️</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-blue-900 text-center">My Tribe</span>
                        </button>
                        <button class="flex flex-col items-center justify-center p-4 bg-white hover:bg-blue-50 rounded-2xl transition-all aspect-square border border-blue-200/50 shadow-sm">
                            <span class="text-2xl mb-2">🏠</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-blue-900 text-center">Apartment</span>
                        </button>
                    </div>
                </div>

                <div class="px-4">
                    <button id="btn-logout" class="w-full py-4 bg-slate-100 text-red-500 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-red-50 transition-colors">Logout Session</button>
                </div>
            </div>

            <!-- BOTTOM NAVIGATION -->
            <nav class="fixed bottom-8 left-0 right-0 px-8 z-[110]">
                <div id="nav-container" class="max-w-[200px] mx-auto bg-slate-900 rounded-full p-2 flex justify-around shadow-2xl">
                    <button data-view="schedule" class="nav-item active w-14 h-14 flex flex-col items-center justify-center rounded-full">
                        <span class="text-xl">📅</span>
                    </button>
                    <button data-view="profile" class="nav-item w-14 h-14 flex flex-col items-center justify-center rounded-full">
                        <span class="text-xl">👤</span>
                    </button>
                </div>
            </nav>
        </div>
    </div>

    <!-- ADMIN MANAGEMENT MODAL -->
    <div id="admin-modal">
        <div class="max-w-md mx-auto p-8">
            <header class="flex items-center justify-between mb-10">
                <div>
                    <h2 id="modal-title" class="text-3xl font-black text-slate-900">Manage</h2>
                    <p id="modal-subtitle" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1">Editing Database</p>
                </div>
                <button id="btn-close-modal" class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-xl">✕</button>
            </header>

            <!-- Form Section -->
            <div id="modal-form" class="bg-slate-50 p-6 rounded-[2rem] mb-8">
                <div id="form-fields" class="space-y-4">
                    <!-- Fields injected here -->
                </div>
                <button id="btn-save-item" class="w-full mt-6 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200">Save Entry</button>
                <button id="btn-cancel-edit" class="hidden w-full mt-2 py-3 text-slate-400 font-bold text-xs uppercase">Cancel Edit</button>
            </div>

            <!-- List Section -->
            <h3 class="font-black text-xs uppercase tracking-widest text-slate-300 mb-4">Current Entries</h3>
            <div id="modal-list" class="space-y-3">
                <!-- List items injected here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // State
        let db, auth, currentUserId;
        let currentMode = 'events'; // 'events' or 'members'
        let editingId = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-2026';

        // DOM Elements
        const input = document.getElementById('user-input');
        const btnEnter = document.getElementById('btn-enter');
        const btnLogout = document.getElementById('btn-logout');
        const adminModal = document.getElementById('admin-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const modalList = document.getElementById('modal-list');
        const formFields = document.getElementById('form-fields');
        const btnSaveItem = document.getElementById('btn-save-item');
        const btnCancelEdit = document.getElementById('btn-cancel-edit');
        const ADMIN_PASS = 'RDS12admin';

        function setupNavigation() {
            const navItems = document.querySelectorAll('.nav-item');
            const views = document.querySelectorAll('.view-content');

            navItems.forEach(btn => {
                btn.onclick = () => {
                    const targetView = btn.getAttribute('data-view');
                    navItems.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    views.forEach(v => {
                        v.classList.remove('active');
                        if(v.id === `view-${targetView}`) v.classList.add('active');
                    });
                };
            });
        }

        // --- Admin Logic ---
        function openManagement(mode) {
            currentMode = mode;
            editingId = null;
            document.getElementById('modal-title').innerText = mode === 'events' ? 'Events' : 'Members';
            adminModal.style.display = 'block';
            renderForm();
            btnCancelEdit.classList.add('hidden');
            btnSaveItem.innerText = 'Save Entry';
        }

        function renderForm() {
            if (currentMode === 'events') {
                formFields.innerHTML = `
                    <div class="input-group"><label>Event Name</label><input type="text" id="f-name" class="input-field" placeholder="Session 1"></div>
                    <div class="input-group"><label>Location</label><input type="text" id="f-location" class="input-field" placeholder="Main Hall"></div>
                    <div class="input-group"><label>Time</label><input type="text" id="f-time" class="input-field" placeholder="10:00 AM"></div>
                    <div class="input-group"><label>Reveal Time</label><input type="text" id="f-reveal" class="input-field" placeholder="09:00 AM"></div>
                `;
            } else {
                formFields.innerHTML = `
                    <div class="input-group"><label>Full Name</label><input type="text" id="f-name" class="input-field" placeholder="John Doe"></div>
                    <div class="input-group"><label>Tribe</label><input type="text" id="f-tribe" class="input-field" placeholder="Lions"></div>
                    <div class="input-group"><label>Apartment</label><input type="text" id="f-apartment" class="input-field" placeholder="Unit 4B"></div>
                `;
            }
        }

        async function saveItem() {
            if (!auth.currentUser) return;
            const data = {};
            const fields = formFields.querySelectorAll('input');
            fields.forEach(f => {
                const key = f.id.replace('f-', '');
                data[key] = f.value;
            });

            if (!data.name) return;

            const colRef = collection(db, 'artifacts', appId, 'public', 'data', currentMode);
            
            try {
                if (editingId) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', currentMode, editingId), data);
                } else {
                    await addDoc(colRef, data);
                }
                resetForm();
            } catch (e) {
                console.error("Save error:", e);
            }
        }

        function resetForm() {
            editingId = null;
            renderForm();
            btnCancelEdit.classList.add('hidden');
            btnSaveItem.innerText = 'Save Entry';
        }

        function startEdit(id, data) {
            editingId = id;
            btnCancelEdit.classList.remove('hidden');
            btnSaveItem.innerText = 'Update Entry';
            
            Object.keys(data).forEach(key => {
                const el = document.getElementById(`f-${key}`);
                if (el) el.value = data[key];
            });
            adminModal.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this?')) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', currentMode, id));
        }

        // --- Auth & Entry ---
        btnEnter.onclick = () => {
            const val = input.value.trim();
            if(!val) return;

            const isAdmin = val === ADMIN_PASS;
            const userName = isAdmin ? 'Admin User' : val;
            
            document.getElementById('display-name').innerText = userName;
            document.getElementById('profile-name').innerText = userName;
            document.getElementById('profile-role').innerText = isAdmin ? 'Event Staff' : 'Attendee';

            if(isAdmin) {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('attendee-controls').classList.add('hidden');
            } else {
                document.getElementById('admin-controls').classList.add('hidden');
                document.getElementById('attendee-controls').classList.remove('hidden');
            }

            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';

            setupNavigation();
            initFirebase();
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnEnter.click();
        });

        btnLogout.onclick = () => location.reload();
        btnCloseModal.onclick = () => adminModal.style.display = 'none';
        btnSaveItem.onclick = saveItem;
        btnCancelEdit.onclick = resetForm;
        document.getElementById('btn-manage-members').onclick = () => openManagement('members');
        document.getElementById('btn-manage-events').onclick = () => openManagement('events');

        async function initFirebase() {
            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (!user) return;
                    currentUserId = user.uid;

                    // Sync Schedule (Public Events)
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                        const events = snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b) => (a.time || "").localeCompare(b.time || ""));
                        
                        // Update Schedule View
                        const feed = document.getElementById('schedule-feed');
                        feed.innerHTML = events.length ? events.map(e => `
                            <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="px-3 py-1 bg-white rounded-full text-[10px] font-black text-blue-600 shadow-sm">${e.time || 'TBD'}</span>
                                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${e.location || 'RDS'}</span>
                                </div>
                                <h4 class="text-lg font-black text-slate-900">${e.name}</h4>
                            </div>
                        `).join('') : `<div class="p-8 border-2 border-dashed border-slate-100 rounded-[2.5rem] text-center"><p class="text-slate-400 text-sm font-bold">Schedule pending...</p></div>`;

                        // Update Admin List if in events mode
                        if (currentMode === 'events') updateAdminList(events);
                    });

                    // Sync Members for Admin
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'members'), (snap) => {
                        const members = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                        if (currentMode === 'members') updateAdminList(members);
                    });
                });
            } catch (err) {
                console.warn("Offline/Firebase error:", err);
            }
        }

        function updateAdminList(items) {
            modalList.innerHTML = items.map(item => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                    <div>
                        <p class="font-black text-slate-900 text-sm">${item.name}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">
                            ${currentMode === 'events' ? (item.time || 'No Time') : (item.tribe || 'No Tribe')}
                        </p>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="window.editItem('${item.id}')" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-xs">✎</button>
                        <button onclick="window.deleteItem('${item.id}')" class="w-8 h-8 bg-red-50 text-red-400 rounded-lg flex items-center justify-center text-xs">✕</button>
                    </div>
                </div>
            `).join('');

            // Helper for global scope access from template literals
            window.editItem = (id) => {
                const item = items.find(i => i.id === id);
                if (item) startEdit(id, item);
            };
            window.deleteItem = deleteItem;
        }

    </script>
</body>
</html>
