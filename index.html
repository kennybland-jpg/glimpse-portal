<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026 Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #0f172a; margin: 0; padding: 0; height: 100vh; }
        
        /* Direct Visibility Management */
        .view-layer { position: fixed; inset: 0; display: none; z-index: 10; }
        .view-active { display: flex !important; }
        
        .glass-card { 
            background: white; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes popIn { 
            from { opacity: 0; transform: scale(0.9) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        
        .animate-pop { animation: popIn 0.25s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }

        .tab-btn.active { background-color: #eff6ff; color: #2563eb; }
        
        /* Interactive feedback */
        .btn-tap { transition: transform 0.1s; cursor: pointer; }
        .btn-tap:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-slate-900">

    <!-- 1. LANDING LAYER -->
    <div id="landing-layer" class="view-layer view-active items-center justify-center p-6 bg-slate-950 z-[100]">
        <div class="w-full max-w-sm glass-card rounded-[3rem] shadow-2xl p-10 text-center animate-pop">
            <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center shadow-2xl text-5xl">✨</div>
            <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tighter">Glimpse 2026</h1>
            <p class="text-slate-400 mb-12 font-semibold italic text-sm">RDS Preview Weekend</p>
            
            <div class="space-y-4">
                <button id="trigger-attendee" class="btn-tap w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-black text-lg shadow-xl shadow-blue-900/20 hover:bg-blue-700">
                    Attendee Login
                </button>
                <button id="trigger-staff" class="btn-tap w-full py-5 border-2 border-slate-100 text-slate-500 rounded-[1.5rem] font-bold">
                    Staff Portal
                </button>
            </div>
        </div>
    </div>

    <!-- 2. LOGIN MODAL LAYER -->
    <div id="login-layer" class="view-layer items-center justify-center p-6 bg-slate-950/90 backdrop-blur-xl z-[200]">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-pop relative">
            <button id="close-login" class="absolute top-6 right-6 p-2 bg-slate-50 rounded-full text-slate-400">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            
            <div class="mb-8">
                <h3 id="login-title" class="font-black text-2xl text-slate-900 tracking-tight">Login</h3>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mt-1">Authorized Access Only</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label id="login-field-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Identity</label>
                    <input id="login-input" type="text" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-semibold text-slate-800" placeholder="Type here..." />
                    <p id="error-msg" class="text-red-500 text-[10px] font-black mt-3 ml-1 hidden uppercase tracking-tighter">Access Denied</p>
                </div>
                <button id="submit-login" class="btn-tap w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-2xl">
                    Enter Portal
                </button>
            </div>
        </div>
    </div>

    <!-- 3. MAIN APP LAYER -->
    <div id="app-layer" class="view-layer bg-slate-50 overflow-y-auto z-[50]">
        <div class="w-full max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
            
            <header class="px-8 pt-16 pb-6 bg-white sticky top-0 z-20">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px] font-black text-blue-600 tracking-[0.2em] uppercase mb-1">Glimpse 2026 // Live</p>
                        <h1 class="text-3xl font-black text-slate-900">Hey, <span id="user-name">Guest</span></h1>
                    </div>
                    <div class="text-right">
                        <p id="clock" class="text-xs font-bold text-slate-400 tabular-nums">00:00:00</p>
                        <button onclick="location.reload()" class="text-[9px] font-black text-red-400 uppercase tracking-widest mt-1">Log Out</button>
                    </div>
                </div>
            </header>

            <main class="flex-1 px-6 pb-40">
                <!-- Content Sections -->
                <div id="tab-schedule" class="py-4 space-y-4">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest px-1">Timeline</h2>
                    <div id="schedule-list" class="space-y-4"></div>
                </div>

                <div id="tab-info" class="hidden py-4 space-y-6">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest px-1">My Status</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-blue-600 p-6 rounded-[2.5rem] text-white">
                            <p class="text-[10px] font-black text-blue-200 uppercase tracking-widest mb-1">Tribe</p>
                            <h3 id="info-tribe" class="text-2xl font-black">—</h3>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Apt</p>
                            <h3 id="info-apt" class="text-2xl font-black">—</h3>
                        </div>
                    </div>
                    <div id="mates-list" class="space-y-2 mt-4"></div>
                </div>

                <div id="tab-admin" class="hidden py-4 space-y-4">
                    <h2 class="text-xl font-black">Management</h2>
                    <div id="admin-controls" class="space-y-2"></div>
                </div>
            </main>

            <!-- NAV BAR -->
            <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[85%] max-w-[320px] bg-white border shadow-2xl rounded-[2.5rem] p-2 flex justify-between z-[60]">
                <button onclick="navTo('schedule')" id="nav-schedule" class="tab-btn active flex-1 py-4 rounded-[2rem] flex flex-col items-center">
                    <span class="text-xl">📅</span>
                </button>
                <button onclick="navTo('info')" id="nav-info" class="tab-btn flex-1 py-4 rounded-[2rem] flex flex-col items-center text-slate-400">
                    <span class="text-xl">👤</span>
                </button>
                <button onclick="navTo('admin')" id="nav-admin" class="tab-btn hidden flex-1 py-4 rounded-[2rem] flex flex-col items-center text-slate-400">
                    <span class="text-xl">⚙️</span>
                </button>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-2026';

        let events = [];
        let members = [];
        let userMode = 'attendee';

        // --- THE FIX: Explicit UI Manager ---
        const switchView = (layerId) => {
            document.querySelectorAll('.view-layer').forEach(l => l.classList.remove('view-active'));
            document.getElementById(layerId).classList.add('view-active');
        };

        const showModal = (mode) => {
            userMode = mode;
            document.getElementById('login-layer').classList.add('view-active');
            document.getElementById('login-title').innerText = mode === 'admin' ? 'Staff Login' : 'Sign In';
            document.getElementById('login-input').type = mode === 'admin' ? 'password' : 'text';
            document.getElementById('login-input').value = '';
            document.getElementById('login-input').focus();
        };

        // Event Listeners for Landing
        document.getElementById('trigger-attendee').onclick = () => showModal('attendee');
        document.getElementById('trigger-staff').onclick = () => showModal('admin');
        document.getElementById('close-login').onclick = () => document.getElementById('login-layer').classList.remove('view-active');

        // Login Submission
        document.getElementById('submit-login').onclick = async () => {
            const val = document.getElementById('login-input').value.trim();
            if(!val) return;

            if(userMode === 'admin') {
                if(val === 'RDS12admin') {
                    startApp('Staff', true);
                } else {
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } else {
                startApp(val, false);
            }
        };

        async function startApp(name, isAdmin) {
            document.getElementById('user-name').innerText = name;
            if(!auth.currentUser) await signInAnonymously(auth);
            
            switchView('app-layer');
            if(isAdmin) {
                document.getElementById('nav-admin').classList.remove('hidden');
            }
            navTo('schedule');
        }

        // --- NAVIGATION ---
        window.navTo = (tab) => {
            ['schedule', 'info', 'admin'].forEach(t => {
                const content = document.getElementById(`tab-${t}`);
                const btn = document.getElementById(`nav-${t}`);
                if(content) content.classList.toggle('hidden', t !== tab);
                if(btn) {
                    btn.classList.toggle('active', t === tab);
                    btn.classList.toggle('bg-blue-50', t === tab);
                    btn.classList.toggle('text-blue-600', t === tab);
                    btn.classList.toggle('text-slate-400', t !== tab);
                }
            });
            if(tab === 'info') updateInfoView();
        };

        // --- DATABASE ---
        onAuthStateChanged(auth, (user) => {
            if(!user) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), s => {
                events = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderEvents();
            }, e => console.error(e));

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'members'), s => {
                members = s.docs.map(d => ({id: d.id, ...d.data()}));
            }, e => console.error(e));
        });

        function renderEvents() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = events.sort((a,b) => a.time.localeCompare(b.time)).map(e => `
                <div class="bg-white border border-slate-100 p-6 rounded-[2.5rem] shadow-sm animate-pop">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase tracking-widest">${e.time}</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">📍 ${e.location || 'TBA'}</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-900 tracking-tight">${e.name}</h3>
                </div>
            `).join('') || '<p class="text-center py-10 text-slate-300 font-bold italic">Waiting for schedule...</p>';
        }

        function updateInfoView() {
            const name = document.getElementById('user-name').innerText;
            const me = members.find(m => m.name.toLowerCase() === name.toLowerCase());
            document.getElementById('info-tribe').innerText = me?.tribe || '—';
            document.getElementById('info-apt').innerText = me?.apartment || '—';
            
            if(me) {
                const mates = members.filter(m => m.tribe === me.tribe && m.name !== me.name);
                document.getElementById('mates-list').innerHTML = `<h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Team Mates</h4>` + mates.map(m => `
                    <div class="p-4 bg-slate-50 rounded-2xl flex justify-between">
                        <span class="font-bold">${m.name}</span>
                        <span class="text-[10px] font-bold text-slate-400">APT ${m.apartment}</span>
                    </div>
                `).join('');
            }
        }

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour12: false });
        }, 1000);

    </script>
</body>
</html>
