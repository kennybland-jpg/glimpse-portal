<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026 Portal</title>
    <!-- 1. Tailwind for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Lucide Icon Component Wrapper with safety check
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            // Check if lucide exists globally before trying to access the icon
            if (typeof lucide === 'undefined') return <div style={{width: size, height: size}} className={className} />;
            
            const IconComponent = lucide[name];
            return IconComponent ? <IconComponent size={size} className={className} strokeWidth={strokeWidth} /> : null;
        };

        const App = () => {
            const [view, setView] = useState('schedule');
            const [appUser, setAppUser] = useState(null);
            const [loginInput, setLoginInput] = useState("");
            const [isReady, setIsReady] = useState(false);

            // Wait for icons to be available
            useEffect(() => {
                const timer = setInterval(() => {
                    if (typeof lucide !== 'undefined') {
                        setIsReady(true);
                        clearInterval(timer);
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            // Mock Data
            const [schedule] = useState([
                { id: 1, title: "Welcome Orientation", timeLabel: "5:00 PM", location: "Main Hall", startTime: new Date().toISOString(), endTime: new Date(Date.now() + 3600000).toISOString() },
                { id: 2, title: "Dinner & Mixers", timeLabel: "6:30 PM", location: "Dining Common", startTime: new Date().toISOString(), endTime: new Date(Date.now() + 7200000).toISOString() }
            ]);

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Loading...</div>;

            if (!appUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-slate-900">
                        <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-10 text-center z-10">
                            <div className="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-8 flex items-center justify-center shadow-lg">
                                <Icon name="Sparkles" className="text-white" size={40} />
                            </div>
                            <h1 className="text-4xl font-black text-slate-900 mb-2 tracking-tight">Glimpse 2026</h1>
                            <p className="text-slate-500 mb-10 font-medium">RDS Preview Weekend</p>
                            <input 
                                type="text" 
                                placeholder="Enter Name"
                                className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 mb-4 outline-none transition-all"
                                value={loginInput}
                                onChange={(e) => setLoginInput(e.target.value)}
                            />
                            <button 
                                onClick={() => setAppUser({ name: loginInput || "Guest", role: 'attendee', team: 'Blue Tribe', room: 'Apt 4B' })}
                                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition-all active:scale-95"
                            >
                                Get Started
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 pb-28 max-w-md mx-auto shadow-2xl relative flex flex-col overflow-hidden">
                    <header className="bg-white border-b border-slate-100 px-8 pt-14 pb-8">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-[11px] font-black text-blue-600 tracking-widest uppercase mb-1">Live Portal</h1>
                                <p className="text-3xl font-black text-slate-900 tracking-tight">Glimpse</p>
                            </div>
                            <button onClick={() => setAppUser(null)} className="p-3 bg-slate-50 rounded-2xl text-slate-400">
                                <Icon name="LogOut" />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 px-6 py-6 overflow-y-auto">
                        {view === 'schedule' ? (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black text-slate-800 mb-4">Schedule</h2>
                                {schedule.map(event => (
                                    <div key={event.id} className="bg-white border-2 border-slate-100 rounded-[2rem] p-6 shadow-sm">
                                        <span className="text-[10px] font-black uppercase tracking-widest text-blue-600 bg-blue-50 px-3 py-1 rounded-full">{event.timeLabel}</span>
                                        <h3 className="text-lg font-black text-slate-800 mt-2">{event.title}</h3>
                                        <div className="flex items-center text-slate-500 text-sm mt-2">
                                            <Icon name="MapPin" size={14} className="mr-2 text-blue-500" />
                                            {event.location}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20">
                                <Icon name="Info" size={48} className="mx-auto text-slate-200 mb-4" />
                                <p className="text-slate-400 font-bold">Attendee Info coming soon!</p>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-[340px] bg-white/90 backdrop-blur-xl border border-slate-200 shadow-2xl rounded-[2.5rem] p-2 flex justify-around items-center">
                        <button onClick={() => setView('schedule')} className={`p-4 rounded-[2rem] flex-1 flex justify-center ${view === 'schedule' ? 'bg-blue-50 text-blue-600' : 'text-slate-400'}`}>
                            <Icon name="Calendar" strokeWidth={3} />
                        </button>
                        <button onClick={() => setView('info')} className={`p-4 rounded-[2rem] flex-1 flex justify-center ${view === 'info' ? 'bg-blue-50 text-blue-600' : 'text-slate-400'}`}>
                            <Icon name="Info" strokeWidth={3} />
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
