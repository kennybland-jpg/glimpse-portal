<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Refuge - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .view-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, updateDoc, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                ShieldCheck: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></>,
                Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
                Trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></>,
                Edit: <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>,
                X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                ChevronLeft: <><path d="m15 18-6-6 6-6"/></>,
                LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>,
                Unlock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                ArrowRight: <><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'refuge-portal-v5';

        const App = () => {
            const [user, setUser] = useState(null);
            const [appUser, setAppUser] = useState(null);
            const [view, setView] = useState('schedule');
            const [currentTime] = useState(new Date());
            const [attendees, setAttendees] = useState([]);
            const [schedule, setSchedule] = useState([]);
            
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [showAttendeeLogin, setShowAttendeeLogin] = useState(false);
            const [loginInput, setLoginInput] = useState("");
            const [loginError, setLoginError] = useState("");

            const [modal, setModal] = useState({ type: null, data: null });
            const [filterView, setFilterView] = useState(null); // { type: 'tribe' | 'apartment', value: string }

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubA = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendees'), 
                    (s) => setAttendees(s.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error(err));
                const unsubS = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'schedule'), 
                    (s) => setSchedule(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(a.unlockTime) - new Date(b.unlockTime))),
                    (err) => console.error(err));
                return () => { unsubA(); unsubS(); };
            }, [user]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (showAdminLogin) {
                    if (loginInput === "RDS12admin") setAppUser({ role: 'admin', name: 'Staff' });
                    else setLoginError("Invalid password");
                } else {
                    const found = attendees.find(a => a.name.toLowerCase().includes(loginInput.toLowerCase()));
                    if (found) setAppUser({ ...found, role: 'attendee' });
                    else setLoginError("Name not found");
                }
            };

            const saveAttendee = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    name: formData.get('name'),
                    team: formData.get('team'),
                    room: formData.get('room')
                };
                if (modal.data?.id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendees', modal.data.id), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendees'), data);
                }
                setModal({ type: null, data: null });
            };

            const saveEvent = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    title: formData.get('title'),
                    timeLabel: formData.get('timeLabel'),
                    location: formData.get('location'),
                    unlockTime: formData.get('unlockTime')
                };
                if (modal.data?.id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedule', modal.data.id), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedule'), data);
                }
                setModal({ type: null, data: null });
            };

            const deleteItem = async (col, id) => {
                if (!confirm("Are you sure?")) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
            };

            const filteredAttendees = useMemo(() => {
                if (!filterView) return [];
                const key = filterView.type === 'tribe' ? 'team' : 'room';
                return attendees.filter(a => a[key] === filterView.value);
            }, [filterView, attendees]);

            if (!appUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full blur-[100px]" />
                        </div>
                        <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-10 text-center z-10">
                            <div className="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-8 flex items-center justify-center shadow-lg"><Icon name="Users" className="text-white" size={40} /></div>
                            <h1 className="text-3xl font-black text-slate-900 mb-2">The Refuge</h1>
                            <p className="text-slate-500 mb-10 font-medium">RDS Preview Weekend</p>
                            <div className="space-y-4">
                                <button onClick={() => setShowAttendeeLogin(true)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold active:scale-95 transition-transform">Attendee Login</button>
                                <button onClick={() => setShowAdminLogin(true)} className="w-full py-4 border-2 border-slate-100 text-slate-700 rounded-2xl font-bold active:scale-95 transition-transform">Staff Portal</button>
                            </div>
                        </div>

                        {(showAdminLogin || showAttendeeLogin) && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-slate-800">{showAdminLogin ? "Staff Access" : "Enter Portal"}</h3>
                                        <button onClick={() => {setShowAdminLogin(false); setShowAttendeeLogin(false); setLoginError(""); setLoginInput("");}}><Icon name="X" className="text-slate-400" size={20} /></button>
                                    </div>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <input autoFocus type={showAdminLogin ? "password" : "text"} placeholder={showAdminLogin ? "Password" : "Your Name"} value={loginInput} onChange={(e) => setLoginInput(e.target.value)} className="w-full bg-slate-100 border-2 border-transparent focus:border-blue-600 rounded-2xl px-5 py-4 text-sm font-bold outline-none" />
                                        {loginError && <p className="text-red-500 text-[10px] font-black text-center">{loginError}</p>}
                                        <button className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black">Enter</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col max-w-md mx-auto shadow-2xl relative font-sans overflow-hidden pb-28">
                    <header className="bg-white px-6 pt-12 pb-6 border-b border-slate-100 flex-none flex justify-between items-center">
                        <div>
                            <h1 className="text-[10px] font-black text-blue-600 uppercase tracking-widest">The Refuge Live</h1>
                            <p className="text-2xl font-black text-slate-900">{filterView ? 'Community' : 'Portal'}</p>
                        </div>
                        {filterView ? (
                            <button onClick={() => setFilterView(null)} className="p-3 bg-slate-100 rounded-2xl text-slate-400 font-bold flex items-center gap-2"><Icon name="X" size={18} /></button>
                        ) : (
                            <button onClick={() => setAppUser(null)} className="p-3 bg-slate-100 rounded-2xl text-slate-400"><Icon name="LogOut" size={20} /></button>
                        )}
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 py-6 scrollbar-hide">
                        {filterView ? (
                            <div className="view-enter space-y-4">
                                <div className="mb-6">
                                    <p className="text-xs font-black text-slate-400 uppercase">{filterView.type === 'tribe' ? 'Tribe Members' : 'Apartment Mates'}</p>
                                    <h2 className="text-3xl font-black text-slate-800">{filterView.value}</h2>
                                </div>
                                <div className="space-y-3">
                                    {filteredAttendees.map(a => (
                                        <div key={a.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center justify-between">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center font-black">{a.name.charAt(0)}</div>
                                                <p className="font-black text-slate-800">{a.name} {a.id === appUser.id && "(You)"}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <>
                                {view === 'schedule' && (
                                    <div className="view-enter space-y-4">
                                        <h2 className="text-xl font-black text-slate-800 flex items-center"><Icon name="Calendar" className="mr-2 text-blue-600" size={20} /> Timeline</h2>
                                        {schedule.map(item => {
                                            const unlocked = currentTime >= new Date(item.unlockTime) || appUser.role === 'admin';
                                            return (
                                                <div key={item.id} className={`p-6 rounded-[2rem] border ${unlocked ? 'bg-white shadow-sm border-slate-100' : 'bg-slate-200 opacity-50'}`}>
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span className={`text-[10px] font-black px-3 py-1 rounded-full ${unlocked ? 'bg-blue-50 text-blue-600' : 'bg-slate-300'}`}>{item.timeLabel}</span>
                                                        <Icon name={unlocked ? "Unlock" : "Lock"} size={14} className={unlocked ? "text-green-500" : "text-slate-400"} />
                                                    </div>
                                                    <h3 className="text-lg font-black text-slate-800">{unlocked ? item.title : "Locked Event"}</h3>
                                                    {unlocked && <div className="mt-2 text-slate-500 text-xs font-bold flex items-center"><Icon name="MapPin" size={14} className="mr-1" /> {item.location}</div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {view === 'info' && (
                                    <div className="view-enter space-y-6">
                                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 text-center">
                                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center font-black text-xl">{appUser.name.charAt(0)}</div>
                                            <h2 className="text-2xl font-black text-slate-800">Hi, {appUser.name}!</h2>
                                            <p className="text-slate-400 text-sm font-bold mt-1">Select a card below to see your community.</p>
                                        </div>
                                        <div className="grid grid-cols-1 gap-4">
                                            <button 
                                                onClick={() => appUser.team && setFilterView({ type: 'tribe', value: appUser.team })}
                                                className="bg-blue-600 text-white p-8 rounded-[2.5rem] text-left relative overflow-hidden active:scale-[0.98] transition-all group"
                                            >
                                                <div className="relative z-10">
                                                    <p className="text-[10px] font-black uppercase opacity-60 mb-1">Your Tribe</p>
                                                    <p className="text-2xl font-black">{appUser.team || "Not Assigned"}</p>
                                                    <div className="mt-4 flex items-center text-[10px] font-black uppercase tracking-widest gap-2">
                                                        View Members <Icon name="ArrowRight" size={14} />
                                                    </div>
                                                </div>
                                                <Icon name="Users" size={120} className="absolute -bottom-4 -right-4 text-white opacity-10 group-hover:scale-110 transition-transform" />
                                            </button>
                                            
                                            <button 
                                                onClick={() => appUser.room && setFilterView({ type: 'apartment', value: appUser.room })}
                                                className="bg-white border-2 border-slate-100 p-8 rounded-[2.5rem] text-left relative overflow-hidden active:scale-[0.98] transition-all group"
                                            >
                                                <div className="relative z-10">
                                                    <p className="text-[10px] font-black uppercase text-slate-400 mb-1">Apartment #</p>
                                                    <p className="text-2xl font-black text-slate-800">{appUser.room || "N/A"}</p>
                                                    <div className="mt-4 flex items-center text-[10px] font-black uppercase tracking-widest gap-2 text-blue-600">
                                                        View Mates <Icon name="ArrowRight" size={14} />
                                                    </div>
                                                </div>
                                                <Icon name="Home" size={120} className="absolute -bottom-4 -right-4 text-slate-50 opacity-50 group-hover:scale-110 transition-transform" />
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {view === 'admin' && (
                                    <div className="view-enter space-y-6">
                                        <h2 className="text-xl font-black text-slate-800">Staff Control</h2>
                                        <div className="space-y-4">
                                            <button onClick={() => setView('editAttendees')} className="w-full flex items-center justify-between bg-white border p-6 rounded-[2rem]">
                                                <span className="font-black">Directory ({attendees.length})</span>
                                                <Icon name="Users" size={24} className="text-blue-600" />
                                            </button>
                                            <button onClick={() => setView('manageEvents')} className="w-full flex items-center justify-between bg-white border p-6 rounded-[2rem]">
                                                <span className="font-black">Schedule ({schedule.length})</span>
                                                <Icon name="Calendar" size={24} className="text-blue-600" />
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {view === 'editAttendees' && (
                                    <div className="view-enter space-y-4">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setView('admin')} className="text-blue-600 font-black flex items-center"><Icon name="ChevronLeft" size={20} /> Back</button>
                                            <button onClick={() => setModal({ type: 'attendee', data: {} })} className="p-3 bg-blue-600 text-white rounded-full"><Icon name="Plus" size={20} /></button>
                                        </div>
                                        {attendees.map(a => (
                                            <div key={a.id} className="bg-white p-4 rounded-3xl border flex justify-between items-center">
                                                <div>
                                                    <p className="font-black text-slate-800">{a.name}</p>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Tribe: {a.team} • Apt: {a.room}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setModal({ type: 'attendee', data: a })} className="p-2 text-slate-400 hover:text-blue-600"><Icon name="Edit" size={18} /></button>
                                                    <button onClick={() => deleteItem('attendees', a.id)} className="p-2 text-slate-400 hover:text-red-500"><Icon name="Trash" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {view === 'manageEvents' && (
                                    <div className="view-enter space-y-4">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setView('admin')} className="text-blue-600 font-black flex items-center"><Icon name="ChevronLeft" size={20} /> Back</button>
                                            <button onClick={() => setModal({ type: 'event', data: {} })} className="p-3 bg-blue-600 text-white rounded-full"><Icon name="Plus" size={20} /></button>
                                        </div>
                                        {schedule.map(s => (
                                            <div key={s.id} className="bg-white p-4 rounded-3xl border flex justify-between items-center">
                                                <div>
                                                    <p className="font-black text-slate-800">{s.title}</p>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase">{s.timeLabel}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setModal({ type: 'event', data: s })} className="p-2 text-slate-400 hover:text-blue-600"><Icon name="Edit" size={18} /></button>
                                                    <button onClick={() => deleteItem('schedule', s.id)} className="p-2 text-slate-400 hover:text-red-500"><Icon name="Trash" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    {/* Modals */}
                    {modal.type && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <h3 className="text-xl font-black mb-6 text-slate-800">{modal.data?.id ? 'Edit' : 'Add New'} {modal.type === 'attendee' ? 'Attendee' : 'Event'}</h3>
                                <form onSubmit={modal.type === 'attendee' ? saveAttendee : saveEvent} className="space-y-4">
                                    {modal.type === 'attendee' ? (
                                        <>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Full Name</label><input name="name" defaultValue={modal.data?.name} required className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Tribe Name</label><input name="team" defaultValue={modal.data?.team} className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Apartment #</label><input name="room" defaultValue={modal.data?.room} className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                        </>
                                    ) : (
                                        <>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Event Title</label><input name="title" defaultValue={modal.data?.title} required className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Time Label</label><input name="timeLabel" defaultValue={modal.data?.timeLabel} required className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Location</label><input name="location" defaultValue={modal.data?.location} required className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Unlock Date/Time</label><input type="datetime-local" name="unlockTime" defaultValue={modal.data?.unlockTime ? new Date(modal.data.unlockTime).toISOString().slice(0, 16) : ''} required className="w-full bg-slate-50 border rounded-2xl p-4 text-sm font-bold" /></div>
                                        </>
                                    )}
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setModal({ type: null, data: null })} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-500">Cancel</button>
                                        <button className="flex-1 py-4 bg-blue-600 rounded-2xl font-black text-white">Save</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {!filterView && (
                        <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] bg-white border shadow-xl rounded-full p-2 flex justify-around items-center z-50">
                            <button onClick={() => setView('schedule')} className={`py-4 rounded-full flex-1 flex justify-center ${view === 'schedule' ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}><Icon name="Calendar" size={22} /></button>
                            <button onClick={() => setView('info')} className={`py-4 rounded-full flex-1 flex justify-center ${view === 'info' ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}><Icon name="User" size={22} /></button>
                            {appUser?.role === 'admin' && (
                                <button onClick={() => setView('admin')} className={`py-4 rounded-full flex-1 flex justify-center ${['admin', 'editAttendees', 'manageEvents'].includes(view) ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}><Icon name="ShieldCheck" size={22} /></button>
                            )}
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
