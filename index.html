<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .glass-card { background: white; width: 95%; max-width: 420px; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-press:active { transform: scale(0.96); }
        #app-view { display: none; position: fixed; inset: 0; background: #ffffff; z-index: 100; overflow-y: auto; }
        .nav-item { transition: all 0.2s ease; color: #94a3b8; cursor: pointer; }
        .nav-item.active { background-color: #2563eb; color: white; transform: translateY(-4px); }
        .view-content { display: none; }
        .view-content.active { display: block; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .admin-widget { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .input-pill { width: 100%; background: #f1f5f9; border: 2px solid transparent; border-radius: 1rem; padding: 0.75rem 1rem; outline: none; font-weight: 600; font-size: 14px; color: #1e293b; }
        .input-pill:focus { border-color: #2563eb; background: white; }
        
        .reveal-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clickable-card { cursor: pointer; transition: transform 0.2s; }
        .clickable-card:active { transform: scale(0.95); background-color: #f8fafc; }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="glass-card max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-black">Details</h2>
                <button id="btn-close-modal" class="text-slate-400 font-bold p-2">✕</button>
            </div>
            <div id="modal-body" class="overflow-y-auto pr-2 space-y-4"></div>
            <div id="modal-footer" class="mt-6 pt-4 border-t border-slate-100 flex gap-2"></div>
        </div>
    </div>

    <!-- Gateway View -->
    <div id="gateway-view" class="glass-card">
        <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center shadow-xl text-2xl text-white">✨</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Glimpse</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">RDS 2026 Portal</p>
            <div class="w-full space-y-4">
                <input id="user-input" type="text" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-bold text-slate-800 text-center uppercase" placeholder="Enter your full name" />
                <button id="btn-enter" class="btn-press w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl">Access Portal</button>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-view">
        <div class="max-w-md mx-auto min-h-screen p-8 pb-32">
            <!-- Schedule View -->
            <div id="view-schedule" class="view-content active">
                <header class="mb-10 pt-8 flex justify-between items-start">
                    <div>
                        <p class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Live Schedule</p>
                        <h1 class="text-4xl font-black text-slate-900">Hey, <span id="display-name">Guest</span></h1>
                    </div>
                </header>
                <div id="schedule-feed" class="space-y-4"></div>
            </div>

            <!-- Profile View -->
            <div id="view-profile" class="view-content">
                <header class="mb-10 pt-8"><h1 class="text-4xl font-black text-slate-900">Account</h1></header>
                
                <div class="bg-slate-50 p-8 rounded-[2.5rem] text-center mb-6 border border-slate-100">
                    <div class="w-24 h-24 bg-white shadow-sm rounded-full mx-auto mb-4 flex items-center justify-center text-3xl border border-slate-100">👤</div>
                    <h2 id="profile-name" class="text-2xl font-black text-slate-900">Guest User</h2>
                    
                    <div id="attendee-widgets" class="grid grid-cols-2 gap-3 mt-6">
                        <div id="tribe-card" class="p-4 bg-white rounded-2xl shadow-sm border border-slate-100 text-left clickable-card">
                            <span class="block text-[9px] font-black text-slate-400 uppercase mb-1">Tribe</span>
                            <span id="display-tribe" class="text-sm font-black text-blue-600">None</span>
                            <span class="block text-[8px] text-slate-300 mt-1">Tap to view members</span>
                        </div>
                        <div id="apt-card" class="p-4 bg-white rounded-2xl shadow-sm border border-slate-100 text-left clickable-card">
                            <span class="block text-[9px] font-black text-slate-400 uppercase mb-1">Apt</span>
                            <span id="display-apt" class="text-sm font-black text-blue-600">None</span>
                            <span class="block text-[8px] text-slate-300 mt-1">Tap to view roommates</span>
                        </div>
                    </div>
                </div>

                <!-- Staff Control Widget -->
                <div id="admin-controls" class="hidden admin-widget p-8 rounded-[2.5rem] text-white shadow-xl mb-6">
                    <h3 class="font-black text-sm uppercase tracking-widest opacity-80 mb-6">Staff Control</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-manage-members" class="flex flex-col items-center justify-center p-4 bg-white/10 rounded-2xl aspect-square border border-white/5 btn-press transition-all"><span class="text-2xl mb-2">👥</span><span class="text-[11px] font-black uppercase">Members</span></button>
                        <button id="btn-manage-events" class="flex flex-col items-center justify-center p-4 bg-white/10 rounded-2xl aspect-square border border-white/5 btn-press transition-all"><span class="text-2xl mb-2">🗓️</span><span class="text-[11px] font-black uppercase">Events</span></button>
                    </div>
                </div>

                <button id="btn-logout" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm uppercase btn-press">Log Out</button>
            </div>

            <!-- Tab Navigation -->
            <nav class="fixed bottom-8 left-0 right-0 px-8 z-[110]">
                <div class="max-w-[200px] mx-auto bg-slate-900 rounded-full p-2 flex justify-around shadow-2xl">
                    <button data-view="schedule" class="nav-item active w-14 h-14 flex items-center justify-center rounded-full text-xl">📅</button>
                    <button data-view="profile" class="nav-item w-14 h-14 flex items-center justify-center rounded-full text-xl">👤</button>
                </div>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPSo9wjrQsnrYfnN4a-STKJ43Avr5Et8A",
            authDomain: "glimpse-2026.firebaseapp.com",
            projectId: "glimpse-2026",
            storageBucket: "glimpse-2026.firebasestorage.app",
            messagingSenderId: "923394524187",
            appId: "1:923394524187:web:5ac3d31b8ccb26058a24be",
            measurementId: "G-EJCENYVW5S"
        };

        const appId = 'glimpse-2026';
        let db, auth, currentUserData = null;
        let allMembers = [], allEvents = [];

        const modal = {
            el: document.getElementById('modal-overlay'),
            title: document.getElementById('modal-title'),
            body: document.getElementById('modal-body'),
            footer: document.getElementById('modal-footer'),
            show: function(title, bodyHtml, footerHtml = "") {
                this.title.innerText = title;
                this.body.innerHTML = bodyHtml;
                this.footer.innerHTML = footerHtml;
                this.el.style.display = 'flex';
            },
            hide: function() { this.el.style.display = 'none'; }
        };

        async function init() {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            await signInAnonymously(auth);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    syncData();
                }
            });
        }

        function syncData() {
            const eventsCol = collection(db, 'artifacts', appId, 'public', 'data', 'events');
            const membersCol = collection(db, 'artifacts', appId, 'public', 'data', 'members');

            onSnapshot(eventsCol, (snap) => {
                allEvents = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderSchedule();
            });

            onSnapshot(membersCol, (snap) => {
                allMembers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                // If already logged in, update UI with potentially new data
                if(currentUserData) {
                    const fresh = allMembers.find(m => m.name.toLowerCase() === currentUserData.name.toLowerCase());
                    if(fresh) updateAttendeeUI(fresh);
                }
            });
        }

        function renderSchedule() {
            const feed = document.getElementById('schedule-feed');
            const now = new Date();
            const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const activeEvents = allEvents.filter(e => !e.endTime || e.endTime >= nowStr);
            const html = activeEvents
                .sort((a,b) => (a.time||'').localeCompare(b.time||''))
                .map(e => {
                    const isLocked = e.revealTime && nowStr < e.revealTime;
                    return `
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm reveal-anim">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-3 py-1 rounded-full">${e.time || 'TBD'}</span>
                                ${isLocked ? '<span>🔒</span>' : ''}
                            </div>
                            <h3 class="text-xl font-black text-slate-800 mt-3">${isLocked ? '<span class="text-slate-200 italic">Classified</span>' : e.name}</h3>
                            <div class="flex items-center gap-1 mt-1">
                                <span class="text-xs text-slate-400 font-bold">${isLocked ? '???' : (e.location || 'TBD')}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            feed.innerHTML = html || '<p class="text-center py-10 text-slate-300">No events found.</p>';
        }

        function updateAttendeeUI(member) {
            currentUserData = member;
            document.getElementById('display-tribe').innerText = member.tribe || "Unassigned";
            document.getElementById('display-apt').innerText = member.apt || "Unassigned";
        }

        function showGrouping(type, value) {
            if(!value || value === "Unassigned") return;
            const matches = allMembers.filter(m => m[type] === value);
            const listHtml = matches.map(m => `
                <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-2">
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-xs shadow-sm">👤</div>
                    <div class="text-sm font-bold text-slate-800">${m.name}</div>
                </div>
            `).join('');
            modal.show(`${type === 'tribe' ? 'Tribe' : 'Apt'} members: ${value}`, `
                <div class="pt-2">${listHtml || '<p class="text-slate-400">Nobody else here yet.</p>'}</div>
            `);
        }

        // Logic for Attendee Interactions
        document.getElementById('tribe-card').onclick = () => {
            if(currentUserData) showGrouping('tribe', currentUserData.tribe);
        };
        document.getElementById('apt-card').onclick = () => {
            if(currentUserData) showGrouping('apt', currentUserData.apt);
        };

        // Login Logic
        document.getElementById('btn-enter').onclick = () => {
            const name = document.getElementById('user-input').value.trim();
            if (!name) return;
            
            document.getElementById('display-name').innerText = name.split(' ')[0];
            document.getElementById('profile-name').innerText = name;
            
            const isAdmin = name.toUpperCase() === 'RDS12ADMIN';
            document.getElementById('admin-controls').classList.toggle('hidden', !isAdmin);
            document.getElementById('attendee-widgets').classList.toggle('hidden', isAdmin);
            
            const matched = allMembers.find(m => m.name.toUpperCase() === name.toUpperCase());
            if(matched) {
                updateAttendeeUI(matched);
            } else {
                currentUserData = { name: name, tribe: 'Unassigned', apt: 'Unassigned' };
                updateAttendeeUI(currentUserData);
            }

            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';
        };

        // Member Management
        window.editMember = (id) => openMemberForm(allMembers.find(x => x.id === id));
        window.editEvent = (id) => openEventForm(allEvents.find(x => x.id === id));

        function openMemberForm(m = null) {
            modal.show(m ? "Edit Member" : "New Member", `
                <div class="space-y-4">
                    <input id="f-name" class="input-pill" placeholder="Full Name" value="${m?.name || ''}">
                    <input id="f-tribe" class="input-pill" placeholder="Tribe Name" value="${m?.tribe || ''}">
                    <input id="f-apt" class="input-pill" placeholder="Apartment No." value="${m?.apt || ''}">
                </div>
            `, `
                <button id="btn-submit-member" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Save</button>
                ${m ? `<button id="btn-del-member" class="px-6 py-4 bg-red-50 text-red-600 rounded-2xl font-bold">Delete</button>` : ''}
            `);
            
            document.getElementById('btn-submit-member').onclick = async () => {
                const nameInput = document.getElementById('f-name').value.trim();
                const data = {
                    name: nameInput,
                    tribe: document.getElementById('f-tribe').value,
                    apt: document.getElementById('f-apt').value
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m?.id || nameInput.toLowerCase().replace(/\s+/g, '-')), data);
                modal.hide();
            };
            if(m) document.getElementById('btn-del-member').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m.id));
                modal.hide();
            };
        }

        function openEventForm(e = null) {
            modal.show(e ? "Edit Event" : "New Event", `
                <div class="space-y-4">
                    <input id="e-name" class="input-pill" placeholder="Event Name" value="${e?.name || ''}">
                    <input id="e-loc" class="input-pill" placeholder="Location" value="${e?.location || ''}">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="e-reveal" type="time" class="input-pill" value="${e?.revealTime || ''}">
                        <input id="e-time" type="time" class="input-pill" value="${e?.time || ''}">
                    </div>
                    <input id="e-end" type="time" class="input-pill" placeholder="End Time" value="${e?.endTime || ''}">
                </div>
            `, `
                <button id="btn-submit-event" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Save</button>
                ${e ? `<button id="btn-del-event" class="px-6 py-4 bg-red-50 text-red-600 rounded-2xl font-bold">Delete</button>` : ''}
            `);
            document.getElementById('btn-submit-event').onclick = async () => {
                const data = {
                    name: document.getElementById('e-name').value,
                    location: document.getElementById('e-loc').value,
                    time: document.getElementById('e-time').value,
                    endTime: document.getElementById('e-end').value,
                    revealTime: document.getElementById('e-reveal').value
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', e?.id || Date.now().toString()), data);
                modal.hide();
            };
            if(e) document.getElementById('btn-del-event').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', e.id));
                modal.hide();
            };
        }

        document.getElementById('btn-manage-members').onclick = () => {
            const list = allMembers.map(m => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2">
                    <div class="text-sm font-bold text-slate-800">${m.name}</div>
                    <button onclick="editMember('${m.id}')" class="text-blue-600 text-[10px] font-black uppercase">Edit</button>
                </div>
            `).join('');
            modal.show("Members", `<button id="m-add" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold mb-4">+ Add Member</button><div class="pb-4">${list}</div>`);
            document.getElementById('m-add').onclick = () => openMemberForm();
        };

        document.getElementById('btn-manage-events').onclick = () => {
            const list = allEvents.map(e => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2">
                    <div class="text-sm font-bold text-slate-800">${e.name}</div>
                    <button onclick="editEvent('${e.id}')" class="text-blue-600 text-[10px] font-black uppercase">Edit</button>
                </div>
            `).join('');
            modal.show("Events", `<button id="e-add" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold mb-4">+ Add Event</button><div class="pb-4">${list}</div>`);
            document.getElementById('e-add').onclick = () => openEventForm();
        };

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
                document.getElementById(`view-${btn.dataset.view}`).classList.add('active');
            };
        });

        document.getElementById('btn-close-modal').onclick = () => modal.hide();
        document.getElementById('btn-logout').onclick = () => location.reload();

        init();
    </script>
</body>
</html>
