<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card { 
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 2.5rem;
        }

        .btn-press:active { transform: scale(0.96); }
        
        #app-view {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            overflow-y: auto;
        }

        .nav-item {
            transition: all 0.2s ease;
            color: #94a3b8;
        }
        
        .nav-item.active {
            background-color: #2563eb;
            color: white;
            transform: translateY(-4px);
        }

        .view-content {
            display: none;
        }
        .view-content.active {
            display: block;
        }

        .admin-widget {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .community-widget {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        }
    </style>
</head>
<body>

    <!-- GATEWAY VIEW -->
    <div id="gateway-view" class="glass-card">
        <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center shadow-xl text-2xl">✨</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Glimpse</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">RDS 2026 Preview</p>
            
            <div class="w-full space-y-4">
                <div class="relative">
                    <input id="user-input" type="text" 
                        class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-bold text-slate-800 transition-all text-center" 
                        placeholder="Enter your name" />
                </div>
                <button id="btn-enter" class="btn-press w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl transition-all">
                    Access Portal
                </button>
                <p class="text-[10px] text-slate-400 font-medium">Use passcode for staff access</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="app-view">
        <div class="max-w-md mx-auto min-h-screen p-8 pb-32">
            
            <!-- SCHEDULE VIEW -->
            <div id="view-schedule" class="view-content active">
                <header class="mb-10 pt-8">
                    <p class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Welcome Back</p>
                    <h1 class="text-4xl font-black text-slate-900">Hey, <span id="display-name">Guest</span></h1>
                </header>
                
                <section>
                    <h3 class="text-slate-300 font-black text-xs uppercase tracking-widest mb-6">Your Weekend Schedule</h3>
                    <div id="schedule-feed" class="space-y-4">
                        <div class="p-6 bg-slate-50 rounded-3xl animate-pulse h-24"></div>
                        <div class="p-6 bg-slate-50 rounded-3xl animate-pulse h-24"></div>
                    </div>
                </section>
            </div>

            <!-- PROFILE VIEW -->
            <div id="view-profile" class="view-content">
                <header class="mb-10 pt-8">
                    <h1 class="text-4xl font-black text-slate-900">Account</h1>
                </header>
                
                <!-- Main User Card -->
                <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 text-center mb-6">
                    <div class="w-24 h-24 bg-white shadow-sm rounded-full mx-auto mb-4 flex items-center justify-center text-3xl border border-slate-100">👤</div>
                    <h2 id="profile-name" class="text-2xl font-black text-slate-900">Guest User</h2>
                    <p id="profile-role" class="text-blue-600 font-bold text-xs uppercase tracking-widest mt-1">Attendee</p>
                </div>

                <!-- ADMIN ONLY WIDGET -->
                <div id="admin-controls" class="hidden admin-widget p-8 rounded-[2.5rem] text-white shadow-xl mb-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-black text-sm uppercase tracking-widest opacity-80">Staff Control Center</h3>
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                            <span class="text-[9px] font-bold text-green-400 uppercase">Live</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button class="flex flex-col items-center justify-center p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all aspect-square border border-white/5">
                            <span class="text-2xl mb-2">👥</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-center">Manage Members</span>
                        </button>
                        <button class="flex flex-col items-center justify-center p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all aspect-square border border-white/5">
                            <span class="text-2xl mb-2">🗓️</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-center">Manage Events</span>
                        </button>
                    </div>
                </div>

                <!-- ATTENDEE COMMUNITY WIDGET -->
                <div id="attendee-controls" class="hidden community-widget p-8 rounded-[2.5rem] border border-blue-100 shadow-sm mb-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-black text-sm uppercase tracking-widest text-blue-800 opacity-80">Community Hub</h3>
                        <span class="text-[9px] font-bold text-blue-500 uppercase">Your Group</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button class="flex flex-col items-center justify-center p-4 bg-white hover:bg-blue-50 rounded-2xl transition-all aspect-square border border-blue-200/50 shadow-sm">
                            <span class="text-2xl mb-2">🛡️</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-blue-900 text-center">My Tribe</span>
                        </button>
                        <button class="flex flex-col items-center justify-center p-4 bg-white hover:bg-blue-50 rounded-2xl transition-all aspect-square border border-blue-200/50 shadow-sm">
                            <span class="text-2xl mb-2">🏠</span>
                            <span class="text-[11px] font-black uppercase tracking-tight text-blue-900 text-center">Apartment</span>
                        </button>
                    </div>
                </div>

                <div class="px-4">
                    <button id="btn-logout" class="w-full py-4 bg-slate-100 text-red-500 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-red-50 transition-colors">Logout Session</button>
                </div>
            </div>

            <!-- BOTTOM NAVIGATION -->
            <nav class="fixed bottom-8 left-0 right-0 px-8 z-[110]">
                <div id="nav-container" class="max-w-[200px] mx-auto bg-slate-900 rounded-full p-2 flex justify-around shadow-2xl">
                    <button data-view="schedule" class="nav-item active w-14 h-14 flex flex-col items-center justify-center rounded-full">
                        <span class="text-xl">📅</span>
                    </button>
                    <button data-view="profile" class="nav-item w-14 h-14 flex flex-col items-center justify-center rounded-full">
                        <span class="text-xl">👤</span>
                    </button>
                </div>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const input = document.getElementById('user-input');
        const btnEnter = document.getElementById('btn-enter');
        const btnLogout = document.getElementById('btn-logout');
        const ADMIN_PASS = 'RDS12admin';

        function setupNavigation() {
            const navItems = document.querySelectorAll('.nav-item');
            const views = document.querySelectorAll('.view-content');

            navItems.forEach(btn => {
                btn.onclick = () => {
                    const targetView = btn.getAttribute('data-view');
                    navItems.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    views.forEach(v => {
                        v.classList.remove('active');
                        if(v.id === `view-${targetView}`) v.classList.add('active');
                    });
                };
            });
        }

        btnEnter.onclick = () => {
            const val = input.value.trim();
            if(!val) return;

            const isAdmin = val === ADMIN_PASS;
            const userName = isAdmin ? 'Admin User' : val;
            
            // UI Setup
            document.getElementById('display-name').innerText = userName;
            document.getElementById('profile-name').innerText = userName;
            document.getElementById('profile-role').innerText = isAdmin ? 'Event Staff' : 'Attendee';

            if(isAdmin) {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('attendee-controls').classList.add('hidden');
            } else {
                document.getElementById('admin-controls').classList.add('hidden');
                document.getElementById('attendee-controls').classList.remove('hidden');
            }

            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';

            setupNavigation();
            initFirebase();
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnEnter.click();
        });

        btnLogout.onclick = () => {
            location.reload();
        };

        async function initFirebase() {
            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-2026';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (!user) return;

                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                        const events = snap.docs.map(doc => doc.data()).sort((a,b) => (a.time || "").localeCompare(b.time || ""));
                        const feed = document.getElementById('schedule-feed');
                        
                        if (events.length === 0) {
                            feed.innerHTML = `
                                <div class="p-8 border-2 border-dashed border-slate-100 rounded-[2.5rem] text-center">
                                    <p class="text-slate-400 text-sm font-bold">Schedule will appear here shortly.</p>
                                </div>
                            `;
                            return;
                        }

                        feed.innerHTML = events.map(e => `
                            <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="px-3 py-1 bg-white rounded-full text-[10px] font-black text-blue-600 shadow-sm">${e.time || 'TBD'}</span>
                                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${e.location || 'RDS'}</span>
                                </div>
                                <h4 class="text-lg font-black text-slate-900">${e.name}</h4>
                            </div>
                        `).join('');
                    }, (err) => console.error("Firestore error:", err));
                });
            } catch (err) {
                console.warn("Offline mode active.");
            }
        }
    </script>
</body>
</html>
