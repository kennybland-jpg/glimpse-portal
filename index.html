<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass-card { background: white; width: 90%; max-width: 380px; border-radius: 2.5rem; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-press:active { transform: scale(0.96); }
        #app-view { display: none; position: fixed; inset: 0; background: #ffffff; z-index: 100; overflow-y: auto; }
        .nav-item { transition: all 0.2s ease; color: #94a3b8; cursor: pointer; }
        .nav-item.active { background-color: #2563eb; color: white; transform: translateY(-4px); }
        .view-content { display: none; }
        .view-content.active { display: block; }
        .admin-widget { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .full-modal { display: none; position: fixed; inset: 0; background: white; z-index: 200; overflow-y: auto; }
        .input-field { width: 100%; background: #f1f5f9; border-radius: 1rem; padding: 1rem; font-weight: bold; border: 2px solid transparent; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #2563eb; background: white; }
        #loading-toast { display: none; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 1rem 2rem; border-radius: 1rem; font-weight: bold; font-size: 0.8rem; z-index: 300; pointer-events: none; }
        #setup-overlay { display: none; position: fixed; inset: 0; background: #020617; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- Firebase Setup Wizard (Only shows if config is missing/invalid) -->
    <div id="setup-overlay">
        <div class="glass-card max-w-full">
            <h2 class="text-2xl font-black mb-2">Connect Firebase</h2>
            <p class="text-xs text-slate-500 mb-6 font-bold uppercase tracking-tight">Required for GitHub/External Hosting</p>
            <textarea id="config-input" class="w-full h-40 bg-slate-100 rounded-2xl p-4 font-mono text-[10px] mb-4 outline-none focus:ring-2 ring-blue-500" placeholder='Paste your firebaseConfig object here...'></textarea>
            <button id="btn-save-config" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">Initialize Database</button>
            <p class="mt-4 text-[10px] text-center text-slate-400">Get this from Firebase Console > Project Settings > General</p>
        </div>
    </div>

    <!-- GATEWAY -->
    <div id="gateway-view" class="glass-card">
        <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center shadow-xl text-2xl text-white">✨</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Glimpse</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">RDS 2026 Preview</p>
            <div class="w-full space-y-4">
                <input id="user-input" type="text" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-4 outline-none font-bold text-slate-800 text-center uppercase" placeholder="Enter your name" />
                <button id="btn-enter" class="btn-press w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl">Access Portal</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-view">
        <div class="max-w-md mx-auto min-h-screen p-8 pb-32">
            <div id="view-schedule" class="view-content active">
                <header class="mb-10 pt-8">
                    <p class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Welcome Back</p>
                    <h1 class="text-4xl font-black text-slate-900">Hey, <span id="display-name">Guest</span></h1>
                </header>
                <div id="schedule-feed" class="space-y-4"></div>
            </div>

            <div id="view-profile" class="view-content">
                <header class="mb-10 pt-8"><h1 class="text-4xl font-black text-slate-900">Account</h1></header>
                <div class="bg-slate-50 p-8 rounded-[2.5rem] text-center mb-6 border border-slate-100">
                    <div class="w-24 h-24 bg-white shadow-sm rounded-full mx-auto mb-4 flex items-center justify-center text-3xl border border-slate-100">👤</div>
                    <h2 id="profile-name" class="text-2xl font-black text-slate-900">Guest User</h2>
                    <p id="user-role-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">RDS Attendee</p>
                </div>

                <div id="community-hub" class="bg-slate-50 p-8 rounded-[2.5rem] mb-6 border border-slate-100">
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-6">Discovery</h3>
                    <div class="space-y-3 text-left">
                        <button id="card-tribe" class="btn-press w-full bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm text-left">
                            <span class="text-[10px] font-black text-slate-400 uppercase">My Tribe</span>
                            <span id="display-tribe" class="font-black text-blue-600">TBD</span>
                        </button>
                        <button id="card-apt" class="btn-press w-full bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm text-left">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Apartment</span>
                            <span id="display-apt" class="font-black text-slate-900">TBD</span>
                        </button>
                    </div>
                </div>

                <div id="admin-controls" class="hidden admin-widget p-8 rounded-[2.5rem] text-white shadow-xl mb-6">
                    <h3 class="font-black text-sm uppercase tracking-widest opacity-80 mb-6">Staff Control</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-manage-members" class="flex flex-col items-center justify-center p-4 bg-white/10 rounded-2xl aspect-square border border-white/5 btn-press transition-all"><span class="text-2xl mb-2">👥</span><span class="text-[11px] font-black uppercase">Members</span></button>
                        <button id="btn-manage-events" class="flex flex-col items-center justify-center p-4 bg-white/10 rounded-2xl aspect-square border border-white/5 btn-press transition-all"><span class="text-2xl mb-2">🗓️</span><span class="text-[11px] font-black uppercase">Events</span></button>
                    </div>
                </div>

                <button id="btn-logout" class="w-full py-4 bg-slate-100 text-red-500 rounded-2xl font-black text-sm uppercase">Logout Session</button>
            </div>

            <nav class="fixed bottom-8 left-0 right-0 px-8 z-[110]">
                <div class="max-w-[200px] mx-auto bg-slate-900 rounded-full p-2 flex justify-around shadow-2xl">
                    <button data-view="schedule" class="nav-item active w-14 h-14 flex items-center justify-center rounded-full text-xl">📅</button>
                    <button data-view="profile" class="nav-item w-14 h-14 flex items-center justify-center rounded-full text-xl">👤</button>
                </div>
            </nav>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="full-modal">
        <div class="max-w-md mx-auto p-8">
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h2 id="modal-title" class="text-3xl font-black text-slate-900">Manage</h2>
                    <p id="edit-indicator" class="text-[10px] font-bold text-blue-600 uppercase hidden">Editing Mode</p>
                </div>
                <button id="btn-close-modal" class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button>
            </header>
            
            <div id="modal-form" class="bg-slate-50 p-6 rounded-[2rem] mb-8 border border-slate-100">
                <div id="form-fields" class="space-y-3"></div>
                <div class="flex gap-2 mt-6">
                    <button id="btn-save-item" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">Save Entry</button>
                    <button id="btn-cancel-edit" class="hidden px-6 py-4 bg-slate-200 text-slate-600 rounded-2xl font-black">Cancel</button>
                </div>
            </div>

            <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-4">Current List</h3>
            <div id="modal-list" class="space-y-3 pb-24"></div>
        </div>
    </div>

    <div id="loading-toast">Processing...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const ADMIN_PASS = 'RDS12admin';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-prod';
        
        let db, auth, user;
        let currentMode = 'events';
        let editingId = null;
        let unsubscribeList = null;

        // LOAD CONFIG
        let config;
        try {
            // Priority: Environment > LocalStorage > Default/Fallback
            const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const savedConfig = localStorage.getItem('glimpse_fb_config');
            config = envConfig || (savedConfig ? JSON.parse(savedConfig) : null);
        } catch (e) {
            console.error("Config Parse Error", e);
        }

        function showToast(msg) {
            const t = document.getElementById('loading-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function startFirebase(configData) {
            try {
                const firebaseApp = initializeApp(configData);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
                
                onAuthStateChanged(auth, (u) => { 
                    user = u; 
                    if (u) {
                        console.log("Logged in:", u.uid);
                        loadSchedule(); 
                    }
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                document.getElementById('setup-overlay').style.display = 'none';
            } catch (err) {
                console.error("Firebase Init Error:", err);
                if (err.message.includes('api-key-not-valid')) {
                    document.getElementById('setup-overlay').style.display = 'flex';
                }
            }
        }

        // Initialize or Prompt
        if (config && config.apiKey !== 'demo') {
            startFirebase(config);
        } else {
            document.getElementById('setup-overlay').style.display = 'flex';
        }

        document.getElementById('btn-save-config').onclick = () => {
            const raw = document.getElementById('config-input').value;
            try {
                // Try to extract JSON from the typical copy-paste string
                const match = raw.match(/\{[\s\S]*\}/);
                const finalConfig = match ? JSON.parse(match[0].replace(/(\w+):/g, '"$1":')) : JSON.parse(raw);
                localStorage.setItem('glimpse_fb_config', JSON.stringify(finalConfig));
                location.reload();
            } catch (e) {
                alert("Invalid configuration format. Please paste the JSON object exactly as shown in Firebase Console.");
            }
        };

        // --- Core Functions ---
        function loadSchedule() {
            if (!db) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
            onSnapshot(colRef, (snap) => {
                const events = snap.docs.map(d => d.data());
                const feed = document.getElementById('schedule-feed');
                feed.innerHTML = events.sort((a,b)=> (a.time||"").localeCompare(b.time||"")).map(e => `
                    <div class="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <span class="px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-wider">${e.time || 'TBD'}</span>
                        <h4 class="text-xl font-black text-slate-900 mt-3 mb-1">${e.name}</h4>
                        <p class="text-sm text-slate-400 font-bold">${e.location || 'Venue'}</p>
                    </div>
                `).join('') || '<p class="text-center text-slate-400 py-10 font-bold">No events scheduled.</p>';
            });
        }

        const saveEntry = async () => {
            if (!user) return showToast("Authenticating...");
            const nameInput = document.getElementById('f-name');
            const name = nameInput.value.trim();
            if (!name) return;

            showToast("Saving...");
            const payload = { name };
            if (currentMode === 'events') {
                payload.time = document.getElementById('f-time').value;
                payload.location = document.getElementById('f-location').value;
            } else {
                payload.tribe = document.getElementById('f-tribe').value;
                payload.apartment = document.getElementById('f-apt').value;
            }

            try {
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', currentMode, editingId), payload);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', currentMode), { ...payload, createdAt: Date.now() });
                }
                resetForm();
                showToast("Success!");
            } catch (error) {
                console.error(error);
                showToast("Error: " + error.message);
            }
        };

        const resetForm = () => {
            editingId = null;
            document.getElementById('edit-indicator').classList.add('hidden');
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            const inputs = document.querySelectorAll('#form-fields input');
            inputs.forEach(i => i.value = '');
        };

        window.editAdminItem = (id, dataStr) => {
            const data = JSON.parse(decodeURIComponent(dataStr));
            editingId = id;
            document.getElementById('edit-indicator').classList.remove('hidden');
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            document.getElementById('f-name').value = data.name || '';
            if (currentMode === 'events') {
                document.getElementById('f-time').value = data.time || '';
                document.getElementById('f-location').value = data.location || '';
            } else {
                document.getElementById('f-tribe').value = data.tribe || '';
                document.getElementById('f-apt').value = data.apartment || '';
            }
        };

        window.deleteAdminItem = async (id) => {
            if (!confirm("Delete?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', currentMode, id));
        };

        const renderAdminList = () => {
            if (unsubscribeList) unsubscribeList();
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', currentMode);
            unsubscribeList = onSnapshot(colRef, (snap) => {
                const listEl = document.getElementById('modal-list');
                const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                listEl.innerHTML = items.map(item => {
                    const dataAttr = encodeURIComponent(JSON.stringify(item));
                    return `
                        <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                            <div><p class="font-black text-sm">${item.name}</p></div>
                            <div class="flex gap-2">
                                <button onclick="window.editAdminItem('${item.id}', '${dataAttr}')" class="text-blue-600 font-bold text-[10px]">EDIT</button>
                                <button onclick="window.deleteAdminItem('${item.id}')" class="text-red-400 font-bold text-[10px]">DEL</button>
                            </div>
                        </div>`;
                }).join('');
            });
        };

        // --- Event UI Listeners ---
        document.getElementById('btn-enter').onclick = () => {
            const val = document.getElementById('user-input').value.trim();
            if (!val) return;
            const isAdmin = (val.toUpperCase() === ADMIN_PASS.toUpperCase());
            document.getElementById('display-name').innerText = isAdmin ? "Admin" : val;
            document.getElementById('profile-name').innerText = isAdmin ? "Admin" : val;
            if (isAdmin) document.getElementById('admin-controls').classList.remove('hidden');
            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';
        };

        document.getElementById('btn-save-item').onclick = saveEntry;
        document.getElementById('btn-manage-events').onclick = () => openAdminModal('events');
        document.getElementById('btn-manage-members').onclick = () => openAdminModal('members');
        document.getElementById('btn-close-modal').onclick = () => document.getElementById('admin-modal').style.display = 'none';

        function openAdminModal(mode) {
            currentMode = mode;
            document.getElementById('modal-title').innerText = mode === 'events' ? 'Events' : 'Members';
            const fields = document.getElementById('form-fields');
            fields.innerHTML = mode === 'events' 
                ? `<input id="f-name" class="input-field" placeholder="Name"><input id="f-time" class="input-field" placeholder="Time"><input id="f-location" class="input-field" placeholder="Location">`
                : `<input id="f-name" class="input-field" placeholder="Name"><input id="f-tribe" class="input-field" placeholder="Tribe"><input id="f-apt" class="input-field" placeholder="Apartment">`;
            document.getElementById('admin-modal').style.display = 'block';
            renderAdminList();
        }

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                const view = btn.getAttribute('data-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.view-content').forEach(v => v.classList.toggle('active', v.id === `view-${view}`));
            };
        });
        document.getElementById('btn-logout').onclick = () => { localStorage.removeItem('glimpse_fb_config'); location.reload(); };
    </script>
</body>
</html>
