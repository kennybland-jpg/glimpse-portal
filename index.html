<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse 2026 | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .app-container { max-width: 450px; margin: 0 auto; min-height: 100vh; background: #ffffff; color: #0f172a; position: relative; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); sticky; top: 0; z-index: 50; }
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; color: #0f172a; }
        .admin-modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #2563eb; }
        .shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shim 2s infinite; }
        @keyframes shim { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-900 flex flex-col items-center justify-center p-8 text-white">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mb-6 flex items-center justify-center text-3xl shadow-2xl">✨</div>
            <h1 class="text-4xl font-extrabold tracking-tighter mb-2">Glimpse 2026</h1>
            <p class="text-slate-400 text-xs uppercase tracking-[0.4em] mb-12">RDS Experience</p>
            
            <div id="login-options" class="w-full space-y-4">
                <button onclick="showLoginForm('attendee')" class="w-full py-5 bg-blue-600 rounded-2xl font-bold text-lg">Attendee Login</button>
                <button onclick="showLoginForm('staff')" class="w-full py-5 border border-slate-700 rounded-2xl font-bold text-slate-400">Staff Portal</button>
            </div>

            <div id="login-form" class="w-full hidden space-y-4">
                <input id="user-input" type="text" class="text-slate-900 font-bold" placeholder="Name or Passcode">
                <button id="btn-submit" class="w-full py-5 bg-white text-slate-900 rounded-2xl font-bold">Enter Portal</button>
                <button onclick="resetLogin()" class="w-full text-slate-500 text-xs font-bold uppercase py-2">Back</button>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="main-app" class="hidden pb-24">
            <header class="p-6 pt-12">
                <div class="flex justify-between items-start">
                    <div>
                        <p id="user-role-label" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest mb-1">Attendee</p>
                        <h2 class="text-3xl font-extrabold tracking-tight">Hey, <span id="user-display-name">Guest</span></h2>
                    </div>
                    <button onclick="location.reload()" class="bg-slate-100 p-3 rounded-full text-slate-400">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </header>

            <!-- TABS -->
            <main class="px-6">
                <!-- Schedule View -->
                <div id="tab-schedule" class="tab-content active">
                    <h3 class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-6">Weekend Timeline</h3>
                    <div id="schedule-list" class="space-y-4">
                        <!-- Items injected here -->
                    </div>
                </div>

                <!-- Profile/Admin View -->
                <div id="tab-profile" class="tab-content">
                    <div id="attendee-stats" class="grid grid-cols-2 gap-3 mb-8">
                        <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Tribe</p>
                            <p id="stat-tribe" class="font-bold">Not Assigned</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Building</p>
                            <p id="stat-apt" class="font-bold">Not Assigned</p>
                        </div>
                    </div>

                    <div id="admin-controls" class="hidden space-y-4">
                        <h3 class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-4">Admin Console</h3>
                        <button onclick="toggleModal('event-modal', true)" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-2"><span>📅</span> Create Event</button>
                        <button onclick="toggleModal('member-modal', true)" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2"><span>👥</span> Add Member</button>
                    </div>
                </div>
            </main>

            <!-- NAVIGATION -->
            <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[240px] bg-slate-900/90 backdrop-blur-xl rounded-full p-2 flex justify-between shadow-2xl z-50">
                <button onclick="switchTab('schedule')" class="nav-btn bg-white text-slate-900 w-24 py-3 rounded-full font-bold text-sm transition-all">Schedule</button>
                <button onclick="switchTab('profile')" class="nav-btn text-white w-24 py-3 rounded-full font-bold text-sm transition-all">Profile</button>
            </nav>
        </div>
    </div>

    <!-- MODAL: EVENTS -->
    <div id="event-modal" class="admin-modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-extrabold mb-6">New Event</h3>
            <form id="event-form" class="space-y-4">
                <input id="ev-name" placeholder="Event Name" required>
                <input id="ev-loc" placeholder="Location" required>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Reveal Time</label>
                    <input id="ev-reveal" type="datetime-local" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Start Time</label>
                    <input id="ev-start" type="datetime-local" required>
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold">Save Event</button>
                <button type="button" onclick="toggleModal('event-modal', false)" class="w-full py-2 text-slate-400 font-bold text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <!-- MODAL: MEMBERS -->
    <div id="member-modal" class="admin-modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8">
            <h3 class="text-2xl font-extrabold mb-6">New Member</h3>
            <form id="member-form" class="space-y-4">
                <input id="mem-name" placeholder="Full Name" required>
                <input id="mem-tribe" placeholder="Tribe Name" required>
                <input id="mem-apt" placeholder="Apartment #" required>
                <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold">Register Member</button>
                <button type="button" onclick="toggleModal('member-modal', false)" class="w-full py-2 text-slate-400 font-bold text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Config & State
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'glimpse-2026-v2';

        let userMode = 'attendee';
        let currentUser = null;
        let events = [];
        let members = [];

        // --- LOGIN LOGIC ---
        window.showLoginForm = (mode) => {
            userMode = mode;
            document.getElementById('login-options').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('user-input').placeholder = mode === 'staff' ? 'Admin Passcode' : 'Your Name';
            document.getElementById('user-input').type = mode === 'staff' ? 'password' : 'text';
        };

        window.resetLogin = () => {
            document.getElementById('login-options').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
        };

        document.getElementById('btn-submit').onclick = async () => {
            const val = document.getElementById('user-input').value.trim();
            if(!val) return;

            if(userMode === 'staff' && val !== 'RDS12admin') {
                alert('Invalid Passcode');
                return;
            }

            // Enter App
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userMode === 'staff' ? 'Admin' : val;
            document.getElementById('user-role-label').innerText = userMode === 'staff' ? 'Staff Portal' : 'Attendee';
            
            if(userMode === 'staff') {
                document.getElementById('admin-controls').classList.remove('hidden');
            }

            initFirebase(val);
        };

        // --- DATA LOGIC ---
        async function initFirebase(userName) {
            await signInAnonymously(auth);
            
            onAuthStateChanged(auth, (user) => {
                if(!user) return;
                currentUser = user;

                // Sync Events
                const qEvents = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                onSnapshot(qEvents, (snap) => {
                    events = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderEvents();
                }, (err) => console.error("Event Sync Error:", err));

                // Sync Members
                const qMembers = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                onSnapshot(qMembers, (snap) => {
                    members = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const profile = members.find(m => m.name.toLowerCase() === userName.toLowerCase());
                    if(profile) {
                        document.getElementById('stat-tribe').innerText = profile.tribe;
                        document.getElementById('stat-apt').innerText = `Apt ${profile.apartment}`;
                    }
                }, (err) => console.error("Member Sync Error:", err));
            });
        }

        // --- RENDER LOGIC ---
        function renderEvents() {
            const list = document.getElementById('schedule-list');
            if(events.length === 0) {
                list.innerHTML = `<div class="p-8 text-center text-slate-300 font-bold">No events scheduled yet.</div>`;
                return;
            }

            const now = new Date();
            const sorted = events.sort((a,b) => new Date(a.start) - new Date(b.start));

            list.innerHTML = sorted.map(ev => {
                const revealTime = new Date(ev.reveal);
                const isHidden = now < revealTime && userMode !== 'staff';
                
                if(isHidden) {
                    return `
                        <div class="p-6 bg-slate-50 rounded-[2rem] border border-slate-100 opacity-60">
                            <div class="h-2 w-16 bg-slate-200 rounded mb-3"></div>
                            <div class="h-6 w-3/4 shimmer rounded-lg mb-2"></div>
                            <div class="h-2 w-1/2 shimmer rounded"></div>
                        </div>
                    `;
                }

                const startTime = new Date(ev.start).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">${startTime}</span>
                        <h4 class="text-lg font-extrabold mt-3">${ev.name}</h4>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider mt-1">${ev.location}</p>
                    </div>
                `;
            }).join('');
        }

        // --- ACTION LOGIC ---
        window.toggleModal = (id, show) => {
            document.getElementById(id).classList.toggle('active', show);
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // UI Toggle
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => {
                b.classList.remove('bg-white', 'text-slate-900');
                b.classList.add('text-white');
            });
            event.currentTarget.classList.add('bg-white', 'text-slate-900');
        };

        // Form Submits
        document.getElementById('event-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('ev-name').value,
                location: document.getElementById('ev-loc').value,
                reveal: document.getElementById('ev-reveal').value,
                start: document.getElementById('ev-start').value
            };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'events'), data);
            e.target.reset();
            toggleModal('event-modal', false);
        };

        document.getElementById('member-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('mem-name').value,
                tribe: document.getElementById('mem-tribe').value,
                apartment: document.getElementById('mem-apt').value
            };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), data);
            e.target.reset();
            toggleModal('member-modal', false);
        };

    </script>
</body>
</html>
